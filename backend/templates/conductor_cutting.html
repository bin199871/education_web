<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<title>导体棒切割 · 讲解动画</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0b0e1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Microsoft YaHei','PingFang SC',sans-serif;padding:10px}
.app{position:relative;width:100%;max-width:960px;aspect-ratio:3/2;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.8)}.stars{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) infinite alternate}@keyframes twinkle{0%{opacity:.1}100%{opacity:.8}}
#mainCanvas{position:absolute;inset:0;z-index:1;width:100%;height:100%;display:block}
.known-panel{position:absolute;top:60px;left:20px;z-index:2;pointer-events:none;background:rgba(10,15,25,.75);border-radius:10px;padding:14px 16px;opacity:0;transition:opacity .6s ease;color:#cbd5e1;font-size:12px;line-height:1.8}
.known-panel.visible{opacity:1}.known-title{color:#94a3b8;font-size:11px;font-weight:700;margin-bottom:6px}
.solution-panel{position:absolute;right:0;top:50%;transform:translate(100%,-50%);z-index:4;width:270px;max-height:78%;padding:22px 18px;background:rgba(8,12,22,.92);backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,.06);border-radius:14px 0 0 14px;overflow-y:auto;transition:transform .55s cubic-bezier(.23,1,.32,1)}
.solution-panel.visible{transform:translate(0,-50%)}.panel-title{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06);color:#93c5fd}
.step-row{opacity:0;transform:translateX(18px);transition:opacity .4s ease,transform .4s ease;margin-bottom:7px;font-size:13px;line-height:1.6;color:#cbd5e1;display:flex;align-items:flex-start;gap:6px}
.step-row.visible{opacity:1;transform:translateX(0)}.step-badge{display:inline-flex;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.07);align-items:center;justify-content:center;font-size:10px;color:#94a3b8;flex-shrink:0;margin-top:2px}
.answer-box{margin-top:12px;padding:10px 14px;border:1px solid rgba(34,197,94,.25);border-radius:8px;opacity:0;transition:opacity .5s ease,transform .5s cubic-bezier(.34,1.56,.64,1);transform:scale(.9);text-align:center}
.answer-box.visible{opacity:1;transform:scale(1);background:rgba(34,197,94,.08)}.answer-text{color:#22c55e;font-size:15px;font-weight:700}
.scene-overlay{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:3;text-align:center;pointer-events:none}
.ending-bg{position:absolute;inset:0;z-index:5;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);opacity:0;transition:opacity .8s ease;pointer-events:none}
.ending-bg.visible{opacity:1;pointer-events:auto}.ending-card{background:rgba(10,15,25,.94);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:30px 40px;width:460px;text-align:center;transform:scale(.92);transition:transform .6s cubic-bezier(.34,1.56,.64,1)}
.ending-bg.visible .ending-card{transform:scale(1)}.ending-card h2{color:#22c55e;font-size:22px;margin-bottom:22px}
.ending-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ending-item:last-child{border-bottom:none}.ending-item .l{color:#94a3b8;font-size:15px}.ending-item .r{color:#22c55e;font-size:16px;font-weight:700}
.controls{position:absolute;bottom:16px;left:16px;right:16px;z-index:10;display:flex;align-items:center;gap:12px;padding:7px 16px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.04);border-radius:28px;opacity:0;transition:opacity .3s}
.app:hover .controls{opacity:1}.controls button{background:none;border:none;color:#d0dfff;font-size:20px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.controls button:hover{background:rgba(255,255,255,.07)}.controls .spd{font-size:13px;font-weight:700;width:44px;color:#9aa9c9}
.progress-bar{flex:1;height:4px;background:#2a3a5a;border-radius:4px;cursor:pointer;position:relative;min-width:60px}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#f6d365,#fda085);border-radius:4px;transition:width .05s linear}
.time-label{color:#9aa9c9;font-size:12px;min-width:80px;text-align:center;font-variant-numeric:tabular-nums;flex-shrink:0}

@media(max-width:600px){body{padding:4px}.app{border-radius:8px;max-height:95vh}}
</style>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body><div class="app" id="app"><div class="stars" id="stars"></div><canvas id="mainCanvas" width="960" height="640"></canvas>
<div id="emptyHint" style="display:none;position:absolute;inset:0;z-index:20;align-items:center;justify-content:center;color:#ef4444;font-size:18px;background:rgba(8,12,24,.9);display:none">Failed: No scenes</div>
<div class="known-panel" id="knownPanel"><div class="known-title">■ 已知量</div></div>
<div class="solution-panel" id="panel"></div><div class="scene-overlay"><div class="scene-title" id="sceneTitle"></div></div>
<div class="ending-bg" id="endingBg"><div class="ending-card"><h2>✅ 答案汇总</h2><div id="endingAnswers"></div></div></div>
<div class="controls" id="controls"><button id="playBtn">▶</button><button id="rewindBtn">⏮</button><div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div><span class="time-label" id="timeLabel">0:00 / 0:00</span><button class="spd" id="speedBtn">1×</button></div></div>
<script>
(function(){
'use strict';
const _DEFAULTS={m:0.1,B:0.5,L:1.0,v0:4,R:2};
const _IN=(typeof __INJECTED_PARAMS__!=='undefined')?__INJECTED_PARAMS__:{};
const P={m:_IN.m??_DEFAULTS.m,B:_IN.B??_DEFAULTS.B,L:_IN.L??_DEFAULTS.L,v0:_IN.v0??_DEFAULTS.v0,R:_IN.R??_DEFAULTS.R};
P.E=P.B*P.L*P.v0;P.I=P.E/P.R;P.F=P.B*P.I*P.L;P.a=P.F/P.m;
P.vt=P.v0;P.vmax=10;const TOTAL=10800,FPS=60;
const _goals=_IN._goals||[];const _has=(g)=>_goals.includes(g);
const _BRICKS={
  intro:{title:'导体棒切割',dur:.06,goals:[],layers:['bg','env','title','known'],physics:()=>({x:0,v:P.v0})},
  cutting:{title:'切割磁感线',dur:.25,goals:['induced_emf','induced_current','amp_force','terminal_velocity'],
    layers:['bg','env','object','v_arrow','data','title'],
    physics:function(p){var t=p*5,v=Math.max(P.v0-P.a*t,0),x=P.v0*t-0.5*P.a*t*t;if(v<0.5)v=0;return{x:Math.min(x*2,700),v,E:P.B*P.L*v,I:P.B*P.L*v/P.R,F:P.B*P.I*P.L};}},
  sol_emf:{title:'求感应电动势',dur:.08,goals:['induced_emf'],layers:['bg','env','title','panel'],
    physics:()=>({x:200,v:P.v0,E:P.E,I:P.I,F:P.F}),transIn:'E = BLv',
    steps:{title:'求感应电动势',items:['E = BLv','E = BLv₀ = ${P.B}×${P.L}×${P.v0}','E = ${P.E.toFixed(2)} V'],answer:'E = ${P.E.toFixed(2)} V'},
    answerItems:['E = ${P.E.toFixed(2)} V']},
  sol_current:{title:'求感应电流',dur:.08,goals:['induced_current'],layers:['bg','env','title','panel'],
    physics:()=>({x:200,v:P.v0,E:P.E,I:P.I,F:P.F}),transIn:'I = E/R',
    steps:{title:'求感应电流',items:['I = E/R','I = ${P.E.toFixed(2)}/${P.R} = ${P.I.toFixed(4)} A','I = ${P.I.toFixed(4)} A'],answer:'I = ${P.I.toFixed(4)} A'},
    answerItems:['I = ${P.I.toFixed(4)} A']},
  sol_force:{title:'求安培力',dur:.07,goals:['amp_force'],layers:['bg','env','title','panel'],physics:()=>({x:200,v:P.v0,E:P.E,I:P.I,F:P.F}),transIn:'F = BIL',
    steps:{title:'求安培力',items:['F = BIL','F = ${P.B}×${P.I.toFixed(4)}×${P.L}','F = ${P.F.toFixed(4)} N'],answer:'F = ${P.F.toFixed(4)} N'},
    answerItems:['F = ${P.F.toFixed(4)} N']},
  ending:{title:'答案汇总',dur:.05,goals:[],layers:['bg','ending']}
};
function composeScenes(goals){var list=['intro','cutting'];if(_has('induced_emf'))list.push('sol_emf');if(_has('induced_current'))list.push('sol_current');if(_has('amp_force'))list.push('sol_force');list.push('ending');return list;}
function allocateTime(brickIds){var td=0,i,b;for(i=0;i<brickIds.length;i++){b=_BRICKS[brickIds[i]];if(b)td+=b.dur;}var c=0,ss=[];for(i=0;i<brickIds.length;i++){b=_BRICKS[brickIds[i]];if(!b)continue;var w=b.dur/td;ss.push({id:brickIds[i],title:b.title,s:c,e:c+w,layers:b.layers,physics:b.physics,steps:b.steps,transIn:b.transIn,answerItems:b.answerItems});c+=w;}return ss;}
var SCENES=allocateTime(composeScenes(_goals));SCENES.forEach(function(s){s.sf=Math.floor(s.s*TOTAL);s.ef=Math.floor(s.e*TOTAL);s.dur=s.ef-s.sf});
const R={ctx:null,init(c){this.ctx=c.getContext('2d');},rc(x,y,w,h,r){var ctx=this.ctx;if(r>w/2)r=w/2;if(r>h/2)r=h/2;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();},
render(scene,st,frame){var ctx=this.ctx,layers=scene.layers||['bg'];ctx.clearRect(0,0,960,640);
  if(layers.includes('bg')){var g=ctx.createRadialGradient(480,320,0,480,320,500);g.addColorStop(0,'#0f172a');g.addColorStop(.6,'#0a0e17');g.addColorStop(1,'#060a0f');ctx.fillStyle=g;ctx.fillRect(0,0,960,640);}
  if(layers.includes('env')){
    ctx.fillStyle='rgba(59,130,246,.03)';ctx.fillRect(100,300,760,60);ctx.strokeStyle='rgba(59,130,246,.1)';ctx.lineWidth=1;ctx.strokeRect(100,300,760,60);
    ctx.fillStyle='rgba(59,130,246,.15)';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('× B',105,305);
    ctx.strokeStyle='rgba(148,163,184,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(100,310);ctx.lineTo(860,310);ctx.moveTo(100,350);ctx.lineTo(860,350);ctx.stroke();
  }
  if(layers.includes('object')&&st.x>0){
    var bx=100+st.x;ctx.save();ctx.fillStyle='#60a5fa';ctx.shadowColor='rgba(96,165,250,.15)';ctx.shadowBlur=8;ctx.fillRect(bx,308,60,44);ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.15)';ctx.strokeRect(bx,308,60,44);ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('棒',bx+30,330);ctx.restore();}
  if(layers.includes('v_arrow')&&st.v>.05){var bx=100+st.x;
    ctx.save();ctx.strokeStyle='rgba(103,232,249,.6)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(bx+60,330);ctx.lineTo(bx+60+Math.min(st.v*8,60),330);ctx.stroke();
    ctx.fillStyle='#67e8f9';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('v='+st.v.toFixed(1),bx+60+Math.min(st.v*8,60)+2,330);ctx.restore();}
  if(layers.includes('data')&&st.v>.05){ctx.save();this.rc(20,20,200,110,8);ctx.fillStyle='rgba(10,15,25,.72)';ctx.fill();ctx.fillStyle='#94a3b8';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('■ 数据',30,28);
    ctx.fillStyle='#67e8f9';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('v='+st.v.toFixed(2)+'m/s',30,50);
    ctx.fillStyle='#60a5fa';ctx.textAlign='left';ctx.fillText('E='+st.E.toFixed(4)+'V',30,68);
    ctx.fillStyle='#f97316';ctx.textAlign='left';ctx.fillText('I='+st.I.toFixed(4)+'A',30,86);
    ctx.fillStyle='#ef4444';ctx.textAlign='left';ctx.fillText('F='+st.F.toFixed(4)+'N',30,104);ctx.restore();}
  if(layers.includes('title')){var t=scene.title;if(t){ctx.save();ctx.font='bold 14px sans-serif';ctx.fillStyle='rgba(10,15,25,.5)';this.rc(30,24,ctx.measureText(t).width+40,34,8);ctx.fill();ctx.fillStyle='#e2e8f0';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,480,41);ctx.restore();}}
  if(scene.transIn){var sp=(frame/TOTAL-scene.s)/(scene.e-scene.s);if(sp<.15){var a=sp<.075?sp*13.3:(1-(sp-.075)*13.3);ctx.save();ctx.globalAlpha=Math.min(a,1)*.4;ctx.fillStyle='#000';ctx.fillRect(0,0,960,640);ctx.globalAlpha=1;ctx.fillStyle='#e2e8f0';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(scene.transIn,480,320);ctx.restore();}}
}};
})();
</script></body></html>
