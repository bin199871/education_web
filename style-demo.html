<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电场中的带电单摆 · 样片</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  #app { position: relative; }
  canvas { display: block; background: #0a0e17; border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.5); }
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    opacity: 0; transition: opacity 0.3s;
  }
  #app:hover #controls { opacity: 1; }
  #controls button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; font-size: 14px;
  }
  #controls input[type="range"] { flex: 1; height: 4px; }
  #time-display { color: rgba(255,255,255,0.5); font-size: 12px; min-width: 80px; text-align: right; }
  #caption {
    position: absolute;
    bottom: 70px; left: 50%; transform: translateX(-50%);
    color: #fff;
    font-size: 15px;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.8s;
    max-width: 80%;
    line-height: 1.6;
  }
  #caption.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <canvas id="c" width="960" height="640"></canvas>
  <div id="caption"></div>
  <div id="controls">
    <button id="playBtn">⏸</button>
    <input type="range" id="seekBar" min="0" max="100" value="0">
    <span id="time-display">00:00 / 01:20</span>
  </div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 960, H = 640;
var CX = 480, CY = 130;
var L = 130;
var BOB_R = 18;
var mass = 0.1, q = 5e-4, E_val = 2000, g = 10, len_val = 1.0;
var Fq = q * E_val;
var Fg = mass * g;
var Fr = Math.sqrt(Fq*Fq + Fg*Fg);
var eqAngle = Math.atan2(Fq, Fg);
var TOTAL_FRAMES = 4800;
var FPS = 60;
var frame = 0;
var playing = true;

function lerp(a, b, t) { return a + (b-a)*t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeOut(t) { return 1 - Math.pow(1-t, 3); }
function easeOutBack(t) { var c=1.70158; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); }

var captionEl = document.getElementById('caption');

var SCENES = {
  INTRO:       [0,    720],
  FORCES:      [720,  1440],
  SWING:       [1440, 3120],
  ENERGY:      [3120, 4080],
  SOLUTION:    [4080, 4650],
  ENDING:      [4650, 4800],
};

var captions = {
  INTRO: '在竖直平面内，存在水平向右的匀强电场… 一个带正电的小球悬挂于 O 点',
  FORCES: '小球受到三个力：电场力 F电、重力 G、以及它们的合力 F合',
  SWING: '由静止释放后，小球在电场力和重力共同作用下开始摆动',
  ENERGY: '能量在电势能、动能和重力势能之间相互转化，总能量保持不变',
  SOLUTION: '由动能定理：W电 + W重 = ½mv²，代入数据得 v = 4 m/s',
  ENDING: '电场中的摆 — 力与能量的完美结合',
};

function getScene(f) {
  if (f < SCENES.INTRO[1]) return 'INTRO';
  if (f < SCENES.FORCES[1]) return 'FORCES';
  if (f < SCENES.SWING[1]) return 'SWING';
  if (f < SCENES.ENERGY[1]) return 'ENERGY';
  if (f < SCENES.SOLUTION[1]) return 'SOLUTION';
  return 'ENDING';
}

function getPendulumState(frame, scene) {
  if (scene === 'INTRO') return { theta: 0, v: 0, Ek: 0, Ep_g: 0, Ep_e: 0, Etot: 0 };
  if (scene === 'FORCES') return { theta: 0, v: 0, Ek: 0, Ep_g: 0, Ep_e: 0, Etot: 0 };
  if (scene === 'SWING' || scene === 'ENERGY') {
    var localFrame = frame - SCENES.SWING[0];
    var t = localFrame / FPS;
    var thetaMax = eqAngle * 0.95;
    var damping = 0.997;
    var omega0 = 2 * Math.PI / 3.5;
    var amp = thetaMax * Math.pow(damping, t * 2);
    var phase = omega0 * t;
    var theta = amp * (1 - Math.cos(phase * 0.5));
    var v_inst = len_val * amp * omega0 * 0.5 * Math.sin(phase * 0.5);
    var bobX = len_val * Math.sin(theta);
    var bobY = len_val * (1 - Math.cos(theta));
    var Ek = 0.5 * mass * v_inst * v_inst;
    var Ep_g = mass * g * bobY;
    var Ep_e = -Fq * bobX;
    var Etot = Ek + Ep_g + Ep_e;
    return { theta: theta, v: v_inst, Ek: Ek, Ep_g: Ep_g, Ep_e: Ep_e, Etot: Etot };
  }
  return { theta: eqAngle * 0.5, v: 0, Ek: 0, Ep_g: 0.15, Ep_e: -0.15, Etot: 0.3 };
}

function roundRect(c, x, y, w, h, r) {
  if (r > w/2) r = w/2; if (r > h/2) r = h/2;
  c.beginPath(); c.moveTo(x+r, y); c.lineTo(x+w-r, y);
  c.arcTo(x+w, y, x+w, y+r, r); c.lineTo(x+w, y+h-r);
  c.arcTo(x+w, y+h, x+w-r, y+h, r); c.lineTo(x+r, y+h);
  c.arcTo(x, y+h, x, y+h-r, r); c.lineTo(x, y+r);
  c.arcTo(x, y, x+r, y, r); c.closePath();
}

function drawArrow(c, x1, y1, x2, y2, color, lw) {
  var dx = x2-x1, dy = y2-y1, a = Math.atan2(dy, dx);
  c.strokeStyle = color; c.lineWidth = lw || 2.5;
  c.beginPath(); c.moveTo(x1, y1); c.lineTo(x2, y2); c.stroke();
  c.fillStyle = color;
  c.beginPath(); c.moveTo(x2, y2);
  c.lineTo(x2 - 10*Math.cos(a-0.5), y2 - 10*Math.sin(a-0.5));
  c.lineTo(x2 - 10*Math.cos(a+0.5), y2 - 10*Math.sin(a+0.5));
  c.closePath(); c.fill();
}

function drawBackground(scene, frame) {
  var grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W);
  grad.addColorStop(0, '#0f172a'); grad.addColorStop(0.6, '#0a0e17'); grad.addColorStop(1, '#060a0f');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
  if (scene === 'INTRO' || scene === 'ENDING') {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (var i = 0; i < 60; i++) {
      var sx = (i * 137.5) % W, sy = (i * 97.3) % (H * 0.4);
      var tw = Math.sin(frame * 0.02 + i) * 0.5 + 0.5;
      ctx.globalAlpha = tw * 0.3;
      ctx.beginPath(); ctx.arc(sx, sy, 0.3 + (i%3)*0.3, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawFieldArrows(scene, frame) {
  if (scene === 'ENDING') return;
  ctx.save();
  var fo = (frame * 1.5) % 30;
  var scene2 = getScene(frame);
  var state = getPendulumState(frame, scene2);
  var bY = CY + L * Math.cos(state.theta || 0);
  for (var y = 40; y < bY + 30 && y < H - 40; y += 50) {
    ctx.strokeStyle = 'rgba(59,130,246,0.12)'; ctx.lineWidth = 1.2;
    ctx.setLineDash([6, 10]); ctx.lineDashOffset = -frame * 1.2;
    ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(W - 60, y); ctx.stroke();
    ctx.setLineDash([]); ctx.lineDashOffset = 0;
    for (var x = 100; x < W - 80; x += 70) {
      var fx = x + ((fo < 15) ? fo * 1.5 : (fo - 30) * 1.5);
      if (fx < 60 || fx > W - 60) continue;
      ctx.fillStyle = 'rgba(59,130,246,0.15)';
      ctx.beginPath(); ctx.moveTo(fx + 10, y); ctx.lineTo(fx + 2, y-4); ctx.lineTo(fx + 2, y+4); ctx.closePath(); ctx.fill();
    }
  }
  ctx.fillStyle = 'rgba(59,130,246,0.25)';
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  ctx.fillText('E →', W - 60, 42);
  ctx.restore();
}

function drawForceArrows(bX, bY, scene, frame, theta) {
  ctx.save();
  var arrowLenBase = 55, fqLen = (Fq / Fg) * arrowLenBase, fgLen = arrowLenBase, frLen = (Fr / Fg) * arrowLenBase;
  function arrow(fromX, fromY, toX, toY, color, lColor, label) {
    var dx = toX - fromX, dy = toY - fromY, a = Math.atan2(dy, dx);
    ctx.strokeStyle = color; ctx.lineWidth = 2.5;
    ctx.shadowColor = color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.moveTo(toX, toY);
    ctx.lineTo(toX - 10*Math.cos(a-0.5), toY - 10*Math.sin(a-0.5));
    ctx.lineTo(toX - 10*Math.cos(a+0.5), toY - 10*Math.sin(a+0.5));
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = lColor || color; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(label, (fromX+toX)/2, (fromY+toY)/2 - 4);
  }
  arrow(bX, bY, bX, bY+fgLen, 'rgba(59,130,246,0.85)', '#60a5fa', 'G');
  arrow(bX, bY, bX+fqLen, bY, 'rgba(239,68,68,0.85)', '#ef4444', 'F电');
  var rLen = Math.sqrt(fqLen*fqLen + fgLen*fgLen);
  arrow(bX, bY, bX+(fqLen/rLen)*frLen, bY+(fgLen/rLen)*frLen, 'rgba(249,115,22,0.85)', '#fb923c', 'F合');
  if (scene === 'FORCES') {
    var frX = bX+(fqLen/rLen)*frLen, frY = bY+(fgLen/rLen)*frLen;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(bX, bY+fgLen); ctx.lineTo(frX, bY+fgLen); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bX+fqLen, bY); ctx.lineTo(bX+fqLen, frY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('平行四边形法则', frX + 20, frY + 4);
  }
  ctx.fillStyle = 'rgba(10,15,25,0.75)';
  roundRect(ctx, bX+BOB_R+8, bY-52, 120, 50, 6); ctx.fill();
  ctx.font = '11px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ef4444'; ctx.fillText('F电 = ' + Fq.toFixed(1) + ' N', bX+BOB_R+16, bY-38);
  ctx.fillStyle = '#60a5fa'; ctx.fillText('G   = ' + Fg.toFixed(1) + ' N', bX+BOB_R+16, bY-22);
  ctx.fillStyle = '#fb923c'; ctx.fillText('F合 = ' + Fr.toFixed(2) + ' N', bX+BOB_R+16, bY-6);
  ctx.restore();
}

function drawDataPanel(state, scene, frame) {
  ctx.save();
  var px = 20, py = 20, pw = 190, ph = 148;
  ctx.fillStyle = 'rgba(10,15,25,0.8)';
  roundRect(ctx, px, py, pw, ph, 8); ctx.fill();
  ctx.fillStyle = '#94a3b8'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('■ 实时物理量', px + 14, py + 8);
  var items = [
    {l:'角度 θ', v:(Math.abs(state.theta)*180/Math.PI).toFixed(1)+'°', c:'#fbbf24'},
    {l:'速度 v', v:state.v.toFixed(2)+' m/s', c:'#60a5fa'},
    {l:'动能 Ek', v:state.Ek.toFixed(3)+' J', c:'#34d399'},
    {l:'重力势能', v:state.Ep_g.toFixed(3)+' J', c:'#f97316'},
    {l:'电势能', v:state.Ep_e.toFixed(3)+' J', c:'#3b82f6'},
    {l:'总能量', v:state.Etot.toFixed(3)+' J', c:'#a78bfa'},
  ];
  for (var i = 0; i < items.length; i++) {
    var yy = py + 30 + i * 19;
    ctx.fillStyle = '#64748b'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(items[i].l, px + 14, yy);
    ctx.fillStyle = items[i].c; ctx.textAlign = 'right';
    ctx.fillText(items[i].v, px + pw - 12, yy);
  }
  ctx.restore();
}

function drawEnergyBars(state, frame) {
  ctx.save();
  var bx = 30, by = H - 60, bw = W - 60, bh = 14;
  ctx.fillStyle = 'rgba(50,60,80,0.3)';
  roundRect(ctx, bx, by, bw, bh, 7); ctx.fill();
  var Ek = Math.max(0.01, state.Ek), Ep_g = Math.max(0.01, state.Ep_g), Ep_e = Math.max(0.01, Math.abs(state.Ep_e));
  var total = Ek + Ep_g + Ep_e;
  if (total > 0) {
    var eW = (Ep_e/total)*bw, kW = (Ek/total)*bw, gW = (Ep_g/total)*bw;
    ctx.fillStyle = '#3b82f6'; roundRect(ctx, bx, by, eW, bh, 7); ctx.fill();
    ctx.fillStyle = '#34d399'; ctx.fillRect(bx+eW, by, kW, bh);
    ctx.fillStyle = '#f97316'; roundRect(ctx, bx+eW+kW, by, gW, bh, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('⚡电势', bx+6, by-4); ctx.textAlign = 'center'; ctx.fillText('动能', bx+eW+kW/2, by-4);
    ctx.textAlign = 'right'; ctx.fillText('重力势', bx+bw-6, by-4);
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('E总 = ' + state.Etot.toFixed(3) + ' J（能量守恒）', bx+bw/2, by+bh+6);
  }
  ctx.restore();
}

function drawSolution(frame) {
  ctx.save();
  var localF = frame - SCENES.SOLUTION[0];

  // 半透明背景
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, W, H);

  var px = 80, py = 100, pw = W - 160;
  ctx.fillStyle = 'rgba(10,15,25,0.88)';
  roundRect(ctx, px, py, pw, 440, 12); ctx.fill();

  ctx.fillStyle = '#e2e8f0';
  ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('解题过程', px + pw/2, py + 18);

  var steps = [
    '已知：m = 0.1kg, q = 5×10⁻⁴C, E = 2×10³N/C, L = 1.0m, g = 10m/s²',
    '电场力：F电 = qE = 1.0 N',
    '重力：G = mg = 1.0 N',
    '动能定理：W电 + W重 = ½mv²',
    '代入 θ = 37°：v² = 2×(0.6+0.2)/0.1 = 16',
  ];

  var vs = Math.min(Math.floor(localF / 20) + 1, steps.length);
  for (var i = 0; i < vs; i++) {
    var sy = py + 56 + i * 38;
    var op = clamp((localF - i * 20) / 15, 0, 1);
    ctx.globalAlpha = op;
    ctx.fillStyle = '#64748b';
    ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(String(i + 1) + '.', px + 30, sy);
    ctx.fillStyle = '#cbd5e1';
    ctx.font = '15px sans-serif';
    ctx.fillText(steps[i], px + 56, sy);
  }

  var ans = clamp((localF - steps.length * 20) / 20, 0, 1);
  if (ans > 0) {
    ctx.globalAlpha = ans;
    ctx.fillStyle = '#052e16';
    roundRect(ctx, px + 40, py + 310, pw - 80, 60, 10); ctx.fill();
    ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2;
    roundRect(ctx, px + 40, py + 310, pw - 80, 60, 10); ctx.stroke();
    ctx.fillStyle = '#22c55e';
    ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('答案：v = 4 m/s（当 θ = 37° 时）', px + pw/2, py + 340);
  }
  ctx.restore();
}

function drawTitle(frame) {
  ctx.save();
  var progress = clamp(frame / 120, 0, 1);
  var alpha = progress < 0.8 ? progress / 0.8 : (1 - (progress - 0.8) / 0.2);
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('电场中的带电单摆', CX, lerp(300, 240, easeOut(Math.min(progress * 2, 1))));
  if (progress > 0.4) {
    ctx.globalAlpha = (progress - 0.4) / 0.3;
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '16px sans-serif';
    ctx.fillText('力与运动的可视化分析', CX, 284);
  }
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  var scene = getScene(frame);
  var state = getPendulumState(frame, scene);
  var theta = state.theta || 0;
  var bX = CX + L * Math.sin(theta);
  var bY = CY + L * Math.cos(theta);

  drawBackground(scene, frame);
  drawFieldArrows(scene, frame);

  // 圆弧轨迹
  ctx.save(); ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1; ctx.setLineDash([4, 6]);
  ctx.beginPath(); ctx.arc(CX, CY, L, 0.15, Math.PI - 0.15, false); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // 天花板+悬点
  var grad = ctx.createLinearGradient(CX-120, CY, CX+120, CY);
  grad.addColorStop(0, 'rgba(71,85,105,0)'); grad.addColorStop(0.3, 'rgba(71,85,105,0.6)');
  grad.addColorStop(0.7, 'rgba(71,85,105,0.6)'); grad.addColorStop(1, 'rgba(71,85,105,0)');
  ctx.strokeStyle = grad; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(CX-100, CY); ctx.lineTo(CX+100, CY); ctx.stroke();
  ctx.strokeStyle = 'rgba(71,85,105,0.3)'; ctx.lineWidth = 1;
  for (var i = -90; i <= 90; i += 15) {
    ctx.beginPath(); ctx.moveTo(CX+i, CY); ctx.lineTo(CX+i-5, CY+6); ctx.stroke();
  }
  ctx.fillStyle = '#94a3b8'; ctx.beginPath(); ctx.arc(CX, CY, 5, 0, Math.PI*2); ctx.fill();

  // 摆线
  ctx.strokeStyle = 'rgba(148,163,184,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(bX, bY); ctx.stroke();

  // 角度
  if (Math.abs(theta) > 0.02 && (scene === 'SWING' || scene === 'ENERGY')) {
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(CX, CY, 45, -0.05, theta > 0 ? theta : -theta); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('θ=' + (Math.abs(theta)*180/Math.PI).toFixed(1) + '°', CX+45*0.6*(theta>0?1:-1), CY+45*0.6+6);
  }

  // 摆球
  var glow = ctx.createRadialGradient(bX, bY, 2, bX, bY, BOB_R*2);
  glow.addColorStop(0, 'rgba(251,191,36,0.2)'); glow.addColorStop(1, 'rgba(251,191,36,0)');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(bX, bY, BOB_R*2, 0, Math.PI*2); ctx.fill();
  var ballGrad = ctx.createRadialGradient(bX-BOB_R*0.3, bY-BOB_R*0.3, 2, bX, bY, BOB_R);
  ballGrad.addColorStop(0, '#fcd34d'); ballGrad.addColorStop(0.6, '#fbbf24'); ballGrad.addColorStop(1, '#d97706');
  ctx.shadowColor = 'rgba(251,191,36,0.3)'; ctx.shadowBlur = 20;
  ctx.fillStyle = ballGrad;
  ctx.beginPath(); ctx.arc(bX, bY, BOB_R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(bX, bY, BOB_R, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(bX-BOB_R*0.25, bY-BOB_R*0.25, BOB_R*0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('+', bX, bY);

  if (scene === 'FORCES' || scene === 'SWING' || scene === 'ENERGY') drawForceArrows(bX, bY, scene, frame, theta);

  if ((scene === 'SWING' || scene === 'ENERGY') && state.v > 0.05) {
    var vAngle = theta + Math.PI/2;
    var vx = bX + state.v*6*Math.cos(vAngle), vy = bY + state.v*6*Math.sin(vAngle);
    drawArrow(ctx, bX, bY, vx, vy, 'rgba(96,165,250,0.8)');
    ctx.fillStyle = '#60a5fa'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('v', vx+8, vy-4);
    ctx.fillStyle = 'rgba(96,165,250,0.5)'; ctx.font = '10px sans-serif';
    ctx.fillText(state.v.toFixed(2) + 'm/s', vx+22, vy-4);
  }

  if (scene === 'SWING' || scene === 'ENERGY') drawDataPanel(state, scene, frame);
  if (scene === 'ENERGY') drawEnergyBars(state, frame);
  if (scene === 'SOLUTION') drawSolution(frame);
  if (scene === 'INTRO') drawTitle(frame);

  // 字幕
  var ct = '';
  if (scene === 'INTRO' && frame > 20 && frame < 400) ct = captions.INTRO;
  else if (scene === 'FORCES' && frame > SCENES.FORCES[0]+70 && frame < SCENES.FORCES[0]+280) ct = captions.FORCES;
  else if (scene === 'SWING' && frame > SCENES.SWING[0]+30 && frame < SCENES.SWING[0]+200) ct = captions.SWING;
  else if (scene === 'ENERGY' && frame > SCENES.ENERGY[0]+30 && frame < SCENES.ENERGY[0]+200) ct = captions.ENERGY;
  else if (scene === 'SOLUTION') ct = captions.SOLUTION;
  else if (scene === 'ENDING') ct = captions.ENDING;
  if (ct) {
    ctx.save();
    ctx.globalAlpha = (scene === 'SOLUTION' || scene === 'ENDING') ? 1 : 0.9;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, W/2-300, H-50, 600, 36, 8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(ct, W/2, H-32);
    ctx.restore();
  }

  ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.font = '12px sans-serif';
  ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText('education_web · 物理动画引擎', W-16, H-12);
}

var playBtn = document.getElementById('playBtn');
var seekBar = document.getElementById('seekBar');

function tick() {
  if (playing) {
    render();
    frame++;
    if (frame >= TOTAL_FRAMES) {
      frame = TOTAL_FRAMES;
      playing = false;
      playBtn.textContent = '↺';
    }
    seekBar.value = (frame / TOTAL_FRAMES) * 100;
    var cur = Math.floor(frame/FPS);
    var total = Math.floor(TOTAL_FRAMES/FPS);
    var fm = function(s) { return (s < 10 ? '0':'') + s; };
    document.getElementById('time-display').textContent =
      fm(Math.floor(cur/60)) + ':' + fm(cur%60) + ' / ' +
      fm(Math.floor(total/60)) + ':' + fm(total%60);
  }
  requestAnimationFrame(tick);
}

playBtn.addEventListener('click', function() {
  if (frame >= TOTAL_FRAMES) { frame = 0; playing = true; this.textContent = '⏸'; return; }
  playing = !playing;
  this.textContent = playing ? '⏸' : '▶';
});
seekBar.addEventListener('mousedown', function() { playing = false; playBtn.textContent = '▶'; });
seekBar.addEventListener('input', function() {
  frame = Math.round((this.value / 100) * TOTAL_FRAMES);
  render();
});
document.addEventListener('keydown', function(e) { if (e.code === 'Space') { e.preventDefault(); playBtn.click(); } });

seekBar.value = 0;
tick();
</script>
</body>
</html>
