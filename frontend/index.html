    min-height: 100vh;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;

    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    background: #0a0a1a;
    width: 960px;
    height: 640px;
  }
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    transition: opacity 0.3s;
  }
  #controls button {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #controls button:hover { background: rgba(255,255,255,0.3); }
  #controls input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    outline: none;
  }
  #controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #4FC3F7;
    cursor: pointer;
  }
  #time-display {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    min-width: 90px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  #segment-name {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #controls.hidden { opacity: 0; pointer-events: none; }
  #app:hover #controls { opacity: 1; pointer-events: auto; }
</style>

: "升华总结", "startFrame": 1802, "endFrame": 3002, "background": {"component": "drawStarField", "params": {"stars": 100, "rotationSpeed": 0.001, "twinkleIntensity": 0.5}}, "transition_in": null, "transition": {"duration": 20, "easing": "easeOut"}, "layers": [{"component": "drawTypewriterText", "params": {"cx": 480, "cy": 290, "text": "宇宙的答案，藏在你对世界的每一次提问中", "startFrame": 1982, "charsPerSecond": 6, "color": "#FFD700", "font": "bold 28px sans-serif"}}, {"component": "drawTypewriterText", "params": {"cx": 480, "cy": 370, "text": "光年 —— 一堂关于宇宙的物理课", "startFrame": 2402, "charsPerSecond": 5, "color": "#ffffff", "font": "bold 22px sans-serif"}}, {"component": "floatUpText", "params": {"cx": 480, "cy": 660, "targetY": 600, "text": "📚 感谢观看 · 探索永不止步", "color": "#90A4AE", "font": "16px sans-serif", "startFrame": 2762, "floatDuration": 25}}]}]};

(function() {
  var engine = startEngine('stage', TIMELINE, {
    onFrameUpdate: function(frame, total) {
      var seekBar = document.getElementById('seek-bar');
      if (seekBar && total > 0) {
        seekBar.value = (frame / total * 100);
      }
      updateDisplay(frame, total);
    },
    onSegmentChange: function(seg, prev) {
      var nameEl = document.getElementById('segment-name');
      if (nameEl && seg) {
        var actMatch = seg.id ? seg.id.split('-')[0] : '';
        nameEl.textContent = (actMatch ? '第' + actMatch + '幕 · ' : '') + seg.name;
      }
    },
    onComplete: function() {
      var btn = document.getElementById('btn-play');
      if (btn) btn.textContent = '↺';
    }
  });

  function updateDisplay(frame, total) {
    var el = document.getElementById('time-display');
    if (!el) return;
    var f = Math.min(frame, total);
    var sec = Math.floor(f / (TIMELINE.meta.fps || 60));
    var totalSec = Math.floor(total / (TIMELINE.meta.fps || 60));
    el.textContent = fmtTime(sec) + ' / ' + fmtTime(totalSec);
  }

  function fmtTime(s) {
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  // 播放/暂停
  document.getElementById('btn-play').addEventListener('click', function() {
    var state = engine.getState();
    if (state.isComplete) {
      engine.seek(0);
      engine.resume();
      this.textContent = '⏸';
    } else if (state.isPaused) {
      engine.resume();
      this.textContent = '⏸';
    } else {
      engine.pause();
      this.textContent = '▶';
    }
  });

  // 进度条
  var seekBar = document.getElementById('seek-bar');
  var isSeeking = false;
  seekBar.addEventListener('mousedown', function() { isSeeking = true; });
  seekBar.addEventListener('touchstart', function() { isSeeking = true; });
  seekBar.addEventListener('input', function() {
    if (isSeeking) {
      var total = TIMELINE.meta.totalFrames || 1;
      var target = Math.round(this.value / 100 * total);
      engine.seek(target);
      updateDisplay(target, total);
    }
  });
  seekBar.addEventListener('change', function() {
    isSeeking = false;
  });

  // 自动播放
  engine.resume();
  document.getElementById('btn-play').textContent = '⏸';
})();
</script>
