<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电场中的带电单摆 · 样片</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e17;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }
  #app { position: relative; }
  canvas { display: block; background: #0a0e17; border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.5); }
  #info {
    position: absolute;
    bottom: 20px;
    left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    text-align: center;
    pointer-events: none;
  }
  #controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    opacity: 0; transition: opacity 0.3s;
  }
  #app:hover #controls { opacity: 1; }
  #controls button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; font-size: 14px;
  }
  #controls input[type="range"] { flex: 1; height: 4px; }
  #time-display { color: rgba(255,255,255,0.5); font-size: 12px; min-width: 80px; text-align: right; }
  #caption {
    position: absolute;
    bottom: 70px; left: 50%; transform: translateX(-50%);
    color: #fff;
    font-size: 15px;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.8s;
    max-width: 80%;
    line-height: 1.6;
  }
  #caption.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <canvas id="c" width="960" height="640"></canvas>
  <div id="caption"></div>
  <div id="controls">
    <button id="playBtn">⏸</button>
    <input type="range" id="seekBar" min="0" max="100" value="0">
    <span id="time-display">00:00 / 01:20</span>
  </div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W = 960, H = 640;
var CX = 480, CY = 130;  // 悬挂点
var L = 130;  // 摆长(像素)
var BOB_R = 18;

// 物理参数
var mass = 0.1, q = 5e-4, E_val = 2000, g = 10, len_val = 1.0;
var Fq = q * E_val;  // 1.0 N
var Fg = mass * g;   // 1.0 N
var Fr = Math.sqrt(Fq*Fq + Fg*Fg);  // 1.414 N
var eqAngle = Math.atan2(Fq, Fg);  // 45°

// 场景时间轴（总帧数 = 80秒 * 60fps = 4800）
var TOTAL_FRAMES = 4800;
var FPS = 60;
var frame = 0;
var playing = true;

// ─── 工具函数 ───
function lerp(a, b, t) { return a + (b-a)*t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function easeOut(t) { return 1 - Math.pow(1-t, 3); }
function easeOutBack(t) { var c=1.70158; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); }

var captionEl = document.getElementById('caption');

// ─── 场景调度 ───
// 场景时间表（帧号）
var SCENES = {
  INTRO:       [0,    720],    // 0-12s: 场景建立
  FORCES:      [720,  1440],   // 12-24s: 受力分析
  SWING:       [1440, 3120],   // 24-52s: 摆动演示
  ENERGY:      [3120, 4080],   // 52-68s: 能量转化
  SOLUTION:    [4080, 4650],   // 68-77.5s: 解题过程
  ENDING:      [4650, 4800],   // 77.5-80s: 总结
};

var captions = {
  INTRO: '在竖直平面内，存在水平向右的匀强电场… 一个带正电的小球悬挂于 O 点',
  FORCES: '小球受到三个力：电场力 F电、重力 G、以及它们的合力 F合',
  SWING: '由静止释放后，小球在电场力和重力共同作用下开始摆动…',
  ENERGY: '能量在电势能、动能和重力势能之间相互转化，总能量保持不变',
  SOLUTION: '由动能定理：W电 + W重 = ½mv²，代入数据得 v = 4 m/s',
  ENDING: '电场中的摆 — 力与能量的完美结合',
};

function getScene(f) {
  if (f < SCENES.INTRO[1]) return 'INTRO';
  if (f < SCENES.FORCES[1]) return 'FORCES';
  if (f < SCENES.SWING[1]) return 'SWING';
  if (f < SCENES.ENERGY[1]) return 'ENERGY';
  if (f < SCENES.SOLUTION[1]) return 'SOLUTION';
  return 'ENDING';
}

function transitionIn(f, start, dur) {
  var t = clamp((f - start) / dur, 0, 1);
  return easeOut(t);
}

// ─── 物理计算 ───
function getPendulumState(frame, scene) {
  // 在 FORCES 和 SWING 场景中做物理仿真
  var progress, theta, omega;
  var sceneFrames = {
    INTRO: [0, 720],
    FORCES: [720, 1440],
    SWING: [1440, 3120],
    ENERGY: [3120, 4080],
    SOLUTION: [4080, 4650],
    ENDING: [4650, 4800],
  };

  if (scene === 'INTRO') {
    // 缓慢引入
    var t = (frame - sceneFrames.INTRO[0]) / (sceneFrames.INTRO[1] - sceneFrames.INTRO[0]);
    theta = 0;
    if (t > 0.5) theta = 0.05 * (t - 0.5) * 2;
    return { theta: 0, v: 0, Ek: 0, Ep_g: 0, Ep_e: 0, Etot: 0 };
  }

  if (scene === 'FORCES') {
    var t = (frame - sceneFrames.FORCES[0]) / (sceneFrames.FORCES[1] - sceneFrames.FORCES[0]);
    return { theta: 0, v: 0, Ek: 0, Ep_g: 0, Ep_e: 0, Etot: 0 };
  }

  if (scene === 'SWING' || scene === 'ENERGY') {
    // 物理仿真：简谐运动
    var localFrame = frame - sceneFrames.SWING[0];
    var totalSwingFrames = sceneFrames.SWING[1] - sceneFrames.SWING[0];
    // 使用带阻尼的简谐运动，模拟真实摆动
    var T = 30 * FPS;  // 摆动周期（30秒）
    var t = localFrame / FPS;
    var thetaMax = eqAngle * 0.95;  // 略小于平衡角度
    var damping = 0.997;
    var omega0 = 2 * Math.PI / 3.5;  // 角频率
    var amp = thetaMax * Math.pow(damping, t * 2);
    var phase = omega0 * t;
    theta = amp * (1 - Math.cos(phase * 0.5));
    // 速度
    var v_inst = len_val * amp * omega0 * 0.5 * Math.sin(phase * 0.5);

    var bobX = len_val * Math.sin(theta);
    var bobY = len_val * (1 - Math.cos(theta));
    var Ek = 0.5 * mass * v_inst * v_inst;
    var Ep_g = mass * g * bobY;
    var Ep_e = -Fq * bobX;
    var Etot = Ek + Ep_g + Ep_e;

    return { theta: theta, v: v_inst, Ek: Ek, Ep_g: Ep_g, Ep_e: Ep_e, Etot: Etot };
  }

  if (scene === 'SOLUTION' || scene === 'ENDING') {
    // 停在最终位置
    return { theta: eqAngle * 0.5, v: 0, Ek: 0, Ep_g: 0.15, Ep_e: -0.15, Etot: 0.3 };
  }

  return { theta: 0, v: 0, Ek: 0, Ep_g: 0, Ep_e: 0, Etot: 0 };
}

// ─── 核心渲染 ───
function render() {
  ctx.clearRect(0, 0, W, H);

  var scene = getScene(frame);
  var state = getPendulumState(frame, scene);
  var theta = state.theta || 0;
  var bX = CX + L * Math.sin(theta);
  var bY = CY + L * Math.cos(theta);

  // 场景切换淡入淡出
  var alpha = 1;

  // ═══ 背景 ═══
  drawBackground(scene, frame);

  // ═══ 电场箭头（背景层） ═══
  drawFieldArrows(scene, frame);

  // ═══ 虚线圆弧轨迹 ═══
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.arc(CX, CY, L, 0.15, Math.PI - 0.15, false);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // ═══ 天花板 + 悬点 ═══
  ctx.save();
  // 天花板横梁
  var grad = ctx.createLinearGradient(CX-120, CY, CX+120, CY);
  grad.addColorStop(0, 'rgba(71,85,105,0)');
  grad.addColorStop(0.3, 'rgba(71,85,105,0.6)');
  grad.addColorStop(0.7, 'rgba(71,85,105,0.6)');
  grad.addColorStop(1, 'rgba(71,85,105,0)');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(CX-100, CY); ctx.lineTo(CX+100, CY);
  ctx.stroke();
  // 天花板装饰斜线
  ctx.strokeStyle = 'rgba(71,85,105,0.3)';
  ctx.lineWidth = 1;
  for (var i = -90; i <= 90; i += 15) {
    ctx.beginPath();
    ctx.moveTo(CX+i, CY); ctx.lineTo(CX+i-5, CY+6);
    ctx.stroke();
  }
  // 悬点
  ctx.fillStyle = '#94a3b8';
  ctx.beginPath();
  ctx.arc(CX, CY, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // ═══ 摆线 ═══
  ctx.save();
  ctx.strokeStyle = 'rgba(148,163,184,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(CX, CY);
  ctx.lineTo(bX, bY);
  ctx.stroke();
  // 摆长标注（只在特定场景显示）
  if (scene === 'INTRO' || scene === 'FORCES') {
    ctx.fillStyle = 'rgba(148,163,184,0.25)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('L = 1.0m', (CX+bX)/2 - 10, (CY+bY)/2 - 6);
  }
  ctx.restore();

  // ═══ 角度标注 ═══
  if (Math.abs(theta) > 0.02 && (scene === 'SWING' || scene === 'ENERGY')) {
    ctx.save();
    var arcR = 45;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(CX, CY, arcR, -0.05, theta > 0 ? theta : -theta);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    var angleDeg = (Math.abs(theta) * 180 / Math.PI).toFixed(1);
    ctx.fillText('θ=' + angleDeg + '°', CX + arcR * 0.6 * (theta>0?1:-1), CY + arcR * 0.6 + 6);
    ctx.restore();
  }

  // ═══ 摆球 ═══
  ctx.save();
  // 发光
  var glow = ctx.createRadialGradient(bX, bY, 2, bX, bY, BOB_R * 2);
  glow.addColorStop(0, 'rgba(251,191,36,0.2)');
  glow.addColorStop(1, 'rgba(251,191,36,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(bX, bY, BOB_R * 2, 0, Math.PI * 2);
  ctx.fill();
  // 球体
  var ballGrad = ctx.createRadialGradient(bX - BOB_R*0.3, bY - BOB_R*0.3, 2, bX, bY, BOB_R);
  ballGrad.addColorStop(0, '#fcd34d');
  ballGrad.addColorStop(0.6, '#fbbf24');
  ballGrad.addColorStop(1, '#d97706');
  ctx.shadowColor = 'rgba(251,191,36,0.3)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = ballGrad;
  ctx.beginPath();
  ctx.arc(bX, bY, BOB_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // 边框
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(bX, bY, BOB_R, 0, Math.PI * 2);
  ctx.stroke();
  // 高光
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.arc(bX - BOB_R*0.25, bY - BOB_R*0.25, BOB_R*0.3, 0, Math.PI*2);
  ctx.fill();
  // +号
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('+', bX, bY);
  ctx.restore();

  // ═══ 受力分析箭头 ═══
  if (scene === 'FORCES' || scene === 'SWING' || scene === 'ENERGY') {
    drawForceArrows(bX, bY, scene, frame, theta);
  }

  // ═══ 速度箭头 ═══
  if ((scene === 'SWING' || scene === 'ENERGY') && state.v > 0.05) {
    ctx.save();
    var vArrowLen = state.v * 6;
    var vAngle = theta; // 沿切线方向
    var vEndX = bX + vArrowLen * Math.cos(vAngle + Math.PI/2);
    var vEndY = bY + vArrowLen * Math.sin(vAngle + Math.PI/2);
    // 箭头线
    ctx.strokeStyle = 'rgba(96,165,250,0.8)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(bX, bY); ctx.lineTo(vEndX, vEndY);
    ctx.stroke();
    // 箭头头
    var a = Math.atan2(vEndY - bY, vEndX - bX);
    ctx.fillStyle = 'rgba(96,165,250,0.8)';
    ctx.beginPath();
    ctx.moveTo(vEndX, vEndY);
    ctx.lineTo(vEndX - 9*Math.cos(a-0.4), vEndY - 9*Math.sin(a-0.4));
    ctx.lineTo(vEndX - 9*Math.cos(a+0.4), vEndY - 9*Math.sin(a+0.4));
    ctx.closePath();
    ctx.fill();
    // v 标签
    ctx.fillStyle = '#60a5fa';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('v', vEndX + 8, vEndY - 4);
    ctx.font = '10px sans-serif';
    ctx.fillStyle = 'rgba(96,165,250,0.5)';
    ctx.fillText(state.v.toFixed(2) + 'm/s', vEndX + 22, vEndY - 4);
    ctx.restore();
  }

  // ═══ 数据面板 ═══
  if (scene === 'SWING' || scene === 'ENERGY') {
    drawDataPanel(state, scene, frame);
  }

  // ═══ 能量条 ═══
  if (scene === 'ENERGY') {
    drawEnergyBars(state, frame);
  }

  // ═══ 解题过程 ═══
  if (scene === 'SOLUTION') {
    drawSolution(frame);
  }

  // ═══ 标题/场景标注 ═══
  if (scene === 'INTRO') {
    drawTitle(frame);
  }

  // ═══ 字幕 ═══
  updateCaption(scene, frame);

  // ═══ 右下角水印 ═══
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('education_web · 物理动画引擎', W - 16, H - 12);
  ctx.restore();
}

// ─── 背景绘制 ───
function drawBackground(scene, frame) {
  // 深空渐变背景
  var grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W);
  grad.addColorStop(0, '#0f172a');
  grad.addColorStop(0.6, '#0a0e17');
  grad.addColorStop(1, '#060a0f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 星星
  if (scene === 'INTRO' || scene === 'ENDING') {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (var i = 0; i < 60; i++) {
      var sx = (i * 137.5) % W;
      var sy = (i * 97.3) % (H * 0.4);
      var sr = 0.3 + (i % 3) * 0.3;
      var twinkle = Math.sin(frame * 0.02 + i) * 0.5 + 0.5;
      ctx.globalAlpha = twinkle * 0.3;
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ─── 电场箭头 ───
function drawFieldArrows(scene, frame) {
  if (scene === 'ENDING') return;
  ctx.save();
  var alpha = scene === 'INTRO' ? 0.08 : 0.12;
  ctx.globalAlpha = alpha;

  // 流动偏移
  var flowOff = (frame * 1.5) % 30;

  // 多排电场箭头（只在摆球区域上方集中）
  var topY = 40, bottomY = H - 60;
  var spacing = 50;
  var leftX = 60, rightX = W - 60;

  // 读取当前摆球 y 位置，只在球体上方区域画箭头
  var scene2 = getScene(frame);
  var state = getPendulumState(frame, scene2);
  var theta = state.theta || 0;
  var bY = CY + L * Math.cos(theta);
  var fieldBottom = bY + 30;

  for (var y = topY; y < fieldBottom && y < bottomY; y += spacing) {
    // 虚线
    ctx.strokeStyle = 'rgba(59,130,246,0.12)';
    ctx.lineWidth = 1.2;
    ctx.setLineDash([6, 10]);
    ctx.lineDashOffset = -frame * 1.2;
    ctx.beginPath();
    ctx.moveTo(leftX, y); ctx.lineTo(rightX, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;

    // 流动小箭头
    for (var x = leftX + 40; x < rightX - 30; x += 70) {
      var fx = x + ((flowOff < 15) ? flowOff * 1.5 : (flowOff - 30) * 1.5);
      if (fx < leftX || fx > rightX) continue;
      ctx.fillStyle = 'rgba(59,130,246,0.15)';
      ctx.beginPath();
      ctx.moveTo(fx + 10, y); ctx.lineTo(fx + 2, y - 4);
      ctx.lineTo(fx + 2, y + 4);
      ctx.closePath();
      ctx.fill();
    }
  }

  // E 标注
  ctx.fillStyle = 'rgba(59,130,246,0.25)';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('E →', rightX, topY + 2);
  ctx.restore();
}

// ─── 受力箭头 ───
function drawForceArrows(bX, bY, scene, frame, theta) {
  ctx.save();

  var arrowLenBase = 55;
  var fqLen = (Fq / Fg) * arrowLenBase;
  var fgLen = arrowLenBase;
  var frLen = (Fr / Fg) * arrowLenBase;

  function arrow(fromX, fromY, toX, toY, color, label, lColor) {
    var dx = toX - fromX, dy = toY - fromY;
    var angle = Math.atan2(dy, dx);
    var len = Math.sqrt(dx*dx + dy*dy);
    if (len < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY);
    ctx.stroke();
    ctx.shadowBlur = 0;
    var hl = 10, ha = 0.5;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(toX, toY);
    ctx.lineTo(toX - hl*Math.cos(angle-ha), toY - hl*Math.sin(angle-ha));
    ctx.lineTo(toX - hl*Math.cos(angle+ha), toY - hl*Math.sin(angle+ha));
    ctx.closePath();
    ctx.fill();
    // 标签
    ctx.fillStyle = lColor || color;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    var mx = (fromX + toX) / 2, my = (fromY + toY) / 2;
    ctx.fillText(label, mx, my - 4);
  }

  // 重力 G（蓝色↓）
  arrow(bX, bY, bX, bY + fgLen, 'rgba(59,130,246,0.85)', 'G', '#60a5fa');

  // 电场力 F电（红色→）
  arrow(bX, bY, bX + fqLen, bY, 'rgba(239,68,68,0.85)', 'F电', '#ef4444');

  // 合力 F合（橙色↘）
  var rLen = Math.sqrt(fqLen*fqLen + fgLen*fgLen);
  var rX = bX + (fqLen/rLen) * frLen;
  var rY = bY + (fgLen/rLen) * frLen;
  arrow(bX, bY, rX, rY, 'rgba(249,115,22,0.85)', 'F合', '#fb923c');

  // 平行四边形辅助虚线（仅在 FORCES 场景）
  if (scene === 'FORCES') {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    ctx.beginPath();
    ctx.moveTo(bX, bY + fgLen);
    ctx.lineTo(rX, bY + fgLen);
    ctx.moveTo(bX + fqLen, bY);
    ctx.lineTo(bX + fqLen, rY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('平行四边形法则', rX + 20, rY + 4);
  }

  // 力的数值标签（球附近汇总）
  ctx.fillStyle = 'rgba(10,15,25,0.75)';
  roundRect(ctx, bX + BOB_R + 8, bY - 52, 120, 50, 6);
  ctx.fill();

  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ef4444';
  ctx.fillText('F电 = ' + Fq.toFixed(1) + ' N', bX + BOB_R + 16, bY - 38);
  ctx.fillStyle = '#60a5fa';
  ctx.fillText('G   = ' + Fg.toFixed(1) + ' N', bX + BOB_R + 16, bY - 22);
  ctx.fillStyle = '#fb923c';
  ctx.fillText('F合 = ' + Fr.toFixed(2) + ' N', bX + BOB_R + 16, bY - 6);

  ctx.restore();
}

// ─── 数据面板 ───
function drawDataPanel(state, scene, frame) {
  ctx.save();
  var px = 20, py = 20, pw = 190, ph = 148;
  ctx.fillStyle = 'rgba(10,15,25,0.8)';
  roundRect(ctx, px, py, pw, ph, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  roundRect(ctx, px, py, pw, ph, 8);
  ctx.stroke();

  ctx.fillStyle = '#94a3b8';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('■ 实时物理量', px + 14, py + 8);

  var items = [
    { label: '角度 θ', value: (Math.abs(state.theta) * 180 / Math.PI).toFixed(1) + '°', color: '#fbbf24' },
    { label: '速度 v', value: state.v.toFixed(2) + ' m/s', color: '#60a5fa' },
    { label: '动能 Ek', value: state.Ek.toFixed(3) + ' J', color: '#34d399' },
    { label: '重力势能', value: state.Ep_g.toFixed(3) + ' J', color: '#f97316' },
    { label: '电势能', value: state.Ep_e.toFixed(3) + ' J', color: '#3b82f6' },
    { label: '总能量', value: state.Etot.toFixed(3) + ' J', color: '#a78bfa' },
  ];

  for (var i = 0; i < items.length; i++) {
    var yy = py + 30 + i * 19;
    ctx.fillStyle = '#64748b';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(items[i].label, px + 14, yy);
    ctx.fillStyle = items[i].color;
    ctx.textAlign = 'right';
    ctx.fillText(items[i].value, px + pw - 12, yy);
  }
  ctx.restore();
}

// ─── 能量条 ───
function drawEnergyBars(state, frame) {
  ctx.save();
  var bx = 30, by = H - 60, bw = W - 60, bh = 14;

  // 背景
  ctx.fillStyle = 'rgba(50,60,80,0.3)';
  roundRect(ctx, bx, by, bw, bh, 7);
  ctx.fill();

  var Ek = Math.max(0.01, state.Ek);
  var Ep_g = Math.max(0.01, state.Ep_g);
  var Ep_e = Math.max(0.01, Math.abs(state.Ep_e));
  var total = Ek + Ep_g + Ep_e;

  if (total > 0) {
    var eW = (Ep_e / total) * bw;
    var kW = (Ek / total) * bw;
    var gW = (Ep_g / total) * bw;

    // 电势能（蓝色）
    ctx.fillStyle = '#3b82f6';
    roundRect(ctx, bx, by, eW, bh, 7);
    ctx.fill();

    // 动能（绿色）
    ctx.fillStyle = '#34d399';
    ctx.fillRect(bx + eW, by, kW, bh);

    // 重力势能（橙色）
    ctx.fillStyle = '#f97316';
    roundRect(ctx, bx + eW + kW, by, gW, bh, 7);
    ctx.fill();

    // 标签
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText('⚡ 电势能', bx + 6, by - 4);
    ctx.textAlign = 'center';
    ctx.fillText('动能', bx + eW + kW/2, by - 4);
    ctx.textAlign = 'right';
    ctx.fillText('重力势能', bx + bw - 6, by - 4);

    // 总能量值（底部居中）
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('E总 = ' + state.Etot.toFixed(3) + ' J（能量守恒）', bx + bw/2, by + bh + 6);
  }
  ctx.restore();
}

// ─── 解题过程 ───
function drawSolution(frame) {
  ctx.save();
  var localF = frame - SCENES.SOLUTION[0];
  var totalF = SCENES.SOLUTION[1] - SCENES.SOLUTION[0];
  var progress = clamp(localF / totalF, 0, 1);

  // 解题面板（半透明背景）
  var px = 100, py = 160, pw = W - 200, ph = 320;
  ctx.fillStyle = 'rgba(10,15,25,0.85)';
  roundRect(ctx, px, py, pw, ph, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  roundRect(ctx, px, py, pw, ph, 12);
  ctx.stroke();

  // 标题
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('📝 解题过程', px + pw/2, py + 16);

  // 分步显示
  var steps = [
    { label: '已知条件', content: 'm = 0.1kg, q = 5.0×10⁻⁴C, E = 2.0×10³N/C, L = 1.0m, g = 10m/s²' },
    { label: '电场力', content: 'F电 = qE = 5.0×10⁻⁴ × 2.0×10³ = 1.0 N' },
    { label: '重力', content: 'G = mg = 0.1 × 10 = 1.0 N' },
    { label: '动能定理', content: 'W电 + W重 = ½ mv²' },
    { label: '代入数据', content: 'qE·L·sinθ + mg·L·(1-cosθ) = ½ mv²' },
    { label: '当 θ = 37°', content: 'v² = 2×(1.0×0.6 + 1.0×0.2) / 0.1 = 16' },
    { label: '最终答案', content: 'v = 4 m/s' },
  ];

  var visibleSteps = Math.floor(progress * (steps.length + 2));
  var startY = py + 48;
  var lineH = 35;

  for (var i = 0; i < Math.min(visibleSteps, steps.length); i++) {
    var s = steps[i];
    var sy = startY + i * lineH;
    var isAnswer = i === steps.length - 1;
    var appearProgress = clamp((localF - i * 8) / 20, 0, 1);
    if (appearProgress <= 0) continue;

    ctx.globalAlpha = appearProgress;

    if (isAnswer) {
      // 答案高亮
      ctx.fillStyle = '#052e16';
      roundRect(ctx, px + 30, sy - 4, pw - 60, lineH + 8, 8);
      ctx.fill();
      ctx.strokeStyle = '#22c55e';
      ctx.lineWidth = 2;
      roundRect(ctx, px + 30, sy - 4, pw - 60, lineH + 8, 8);
      ctx.stroke();
      ctx.fillStyle = '#22c55e';
      ctx.font = 'bold 17px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✅ ' + s.content, px + pw/2, sy + lineH/2 + 2);
    } else {
      // 普通步骤
      ctx.fillStyle = '#64748b';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('• ' + s.label, px + 36, sy);
      ctx.fillStyle = '#cbd5e1';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(s.content, px + 36 + 70, sy);
    }
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

// ─── 标题 ───
function drawTitle(frame) {
  ctx.save();
  var localF = frame;
  var progress = clamp(localF / 120, 0, 1);
  var alpha = progress < 0.8 ? progress / 0.8 : (1 - (progress - 0.8) / 0.2);
  ctx.globalAlpha = Math.max(0, alpha);

  // 大标题
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var ty = lerp(300, 240, easeOut(Math.min(progress * 2, 1)));
  ctx.fillText('电场中的带电单摆', CX, ty);

  // 副标题
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  if (progress > 0.4) {
    var subAlpha = clamp((progress - 0.4) / 0.3, 0, 1);
    ctx.globalAlpha = subAlpha;
    ctx.fillText('力与运动的可视化分析', CX, ty + 44);
  }

  ctx.restore();
}

// ─── 字幕 ───
function updateCaption(scene, frame) {
  var text = captions[scene] || '';
  var show = false;

  if (scene === 'INTRO') {
    var t = (frame - SCENES.INTRO[0]) / (SCENES.INTRO[1] - SCENES.INTRO[0]);
    show = t > 0.3 && t < 0.9;
  } else if (scene === 'FORCES') {
    var t = (frame - SCENES.FORCES[0]) / (SCENES.FORCES[1] - SCENES.FORCES[0]);
    show = t > 0.1 && t < 0.85;
  } else if (scene === 'SWING') {
    var t = (frame - SCENES.SWING[0]) / (SCENES.SWING[1] - SCENES.SWING[0]);
    show = t > 0.05 && t < 0.2;
  } else if (scene === 'ENERGY') {
    var t = (frame - SCENES.ENERGY[0]) / (SCENES.ENERGY[1] - SCENES.ENERGY[0]);
    show = t > 0.05 && t < 0.2;
  } else if (scene === 'SOLUTION') {
    show = true;
  } else if (scene === 'ENDING') {
    show = true;
  }

  if (show && text) {
    captionEl.textContent = text;
    captionEl.className = 'show';
  } else {
    captionEl.className = '';
  }
}

// ─── 圆角矩形 ───
function roundRect(c, x, y, w, h, r) {
  if (r > w/2) r = w/2;
  if (r > h/2) r = h/2;
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.arcTo(x + w, y, x + w, y + r, r);
  c.lineTo(x + w, y + h - r);
  c.arcTo(x + w, y + h, x + w - r, y + h, r);
  c.lineTo(x + r, y + h);
  c.arcTo(x, y + h, x, y + h - r, r);
  c.lineTo(x, y + r);
  c.arcTo(x, y, x + r, y, r);
  c.closePath();
}

// ─── 播放循环 ───
function tick() {
  if (playing) {
    render();
    frame++;
    if (frame >= TOTAL_FRAMES) {
      frame = TOTAL_FRAMES;
      playing = false;
      document.getElementById('playBtn').textContent = '↺';
    }
    seekBar.value = (frame / TOTAL_FRAMES) * 100;
    updateTimeDisplay();
  }
  requestAnimationFrame(tick);
}

function updateTimeDisplay() {
  var cur = Math.floor(frame / FPS);
  var total = Math.floor(TOTAL_FRAMES / FPS);
  var fm = function(s) { return (s < 10 ? '0' : '') + s; };
  document.getElementById('time-display').textContent =
    fm(Math.floor(cur/60)) + ':' + fm(cur%60) + ' / ' +
    fm(Math.floor(total/60)) + ':' + fm(total%60);
}

// ─── 控制 ───
var playBtn = document.getElementById('playBtn');
var seekBar = document.getElementById('seekBar');

playBtn.addEventListener('click', function() {
  if (frame >= TOTAL_FRAMES) { frame = 0; playing = true; this.textContent = '⏸'; return; }
  playing = !playing;
  this.textContent = playing ? '⏸' : '▶';
});

seekBar.addEventListener('mousedown', function() { playing = false; playBtn.textContent = '▶'; });
seekBar.addEventListener('input', function() {
  frame = Math.round((this.value / 100) * TOTAL_FRAMES);
  render();
  updateTimeDisplay();
});

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
});

// ─── 启动 ───
updateTimeDisplay();
render();
tick();
</script>
