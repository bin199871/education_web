<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<title>斜面+摩擦力 - 物理讲解动画</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Microsoft YaHei','PingFang SC',sans-serif;padding:10px}
.app{position:relative;width:100%;max-width:960px;aspect-ratio:3/2;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.stars{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) infinite alternate}
@keyframes twinkle{0%{opacity:.1}100%{opacity:.8}}
#mainCanvas{position:absolute;inset:0;z-index:1;width:100%;height:100%;display:block}
.solution-panel{position:absolute;right:0;top:50%;transform:translate(100%,-50%);z-index:4;width:270px;max-height:78%;padding:22px 18px;background:rgba(8,12,22,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,.06);border-radius:14px 0 0 14px;overflow-y:auto;transition:transform .55s cubic-bezier(.23,1,.32,1)}
.solution-panel.visible{transform:translate(0,-50%)}
.panel-title{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.step-row{opacity:0;transform:translateX(18px);transition:opacity .4s ease,transform .4s ease;margin-bottom:7px;font-size:13px;line-height:1.6;color:#cbd5e1;display:flex;align-items:flex-start;gap:6px}
.step-row.visible{opacity:1;transform:translateX(0)}
.step-badge{display:inline-flex;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.07);align-items:center;justify-content:center;font-size:10px;color:#94a3b8;flex-shrink:0;margin-top:2px}
.answer-box{margin-top:12px;padding:10px 14px;border:1px solid rgba(34,197,94,.25);border-radius:8px;opacity:0;transition:opacity .5s ease,transform .5s cubic-bezier(.34,1.56,.64,1);transform:scale(.9);text-align:center}
.answer-box.visible{opacity:1;transform:scale(1);background:rgba(34,197,94,.08)}
.answer-text{color:#22c55e;font-size:15px;font-weight:700}
.color-result{color:#22c55e}
.scene-overlay{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:3;text-align:center;pointer-events:none}
.scene-title{color:#e2e8f0;font-size:15px;font-weight:700;background:rgba(0,0,0,.5);padding:5px 18px;border-radius:20px;backdrop-filter:blur(4px);opacity:0;transition:opacity .5s ease;white-space:nowrap}
.scene-title.visible{opacity:1}
.known-panel{position:absolute;top:60px;left:20px;z-index:2;pointer-events:none;background:rgba(10,15,25,.75);border-radius:10px;padding:14px 16px;opacity:0;transition:opacity .6s ease}
.known-panel.visible{opacity:1}
.known-title{color:#94a3b8;font-size:11px;font-weight:700;margin-bottom:6px}
.known-row{color:#cbd5e1;font-size:12px;line-height:1.8}
.ending-bg{position:absolute;inset:0;z-index:5;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;transition:opacity .8s ease;pointer-events:none}
.ending-bg.visible{opacity:1;pointer-events:auto}
.ending-card{background:rgba(10,15,25,.94);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:30px 40px;width:500px;text-align:center;transform:scale(.92);transition:transform .6s cubic-bezier(.34,1.56,.64,1)}
.ending-bg.visible .ending-card{transform:scale(1)}
.ending-card h2{color:#22c55e;font-size:22px;margin-bottom:22px}
.ending-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ending-item:last-child{border-bottom:none}
.ending-item .l{color:#94a3b8;font-size:15px}
.ending-item .r{color:#22c55e;font-size:16px;font-weight:700}
.controls{position:absolute;bottom:16px;left:16px;right:16px;z-index:10;display:flex;align-items:center;gap:12px;padding:7px 16px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.04);border-radius:28px;opacity:0;transition:opacity .3s}
.app:hover .controls{opacity:1}
.controls button{background:none;border:none;color:#d0dfff;font-size:20px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.controls button:hover{background:rgba(255,255,255,.07)}
.controls .spd{font-size:13px;font-weight:700;width:44px;color:#9aa9c9}
.controls .spd:hover{color:#f6d365}
.progress-bar{flex:1;height:4px;background:#2a3a5a;border-radius:4px;cursor:pointer;position:relative;min-width:60px}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#f6d365,#fda085);border-radius:4px;transition:width .05s linear}
.time-label{color:#9aa9c9;font-size:12px;min-width:80px;text-align:center;font-variant-numeric:tabular-nums;flex-shrink:0}

@media(max-width:600px){body{padding:4px}.app{border-radius:8px;max-height:95vh}}
</style>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body><div class="app" id="app">
<div class="stars" id="stars"></div><canvas id="mainCanvas" width="960" height="640"></canvas>
<div id="emptyHint" style="display:none;position:absolute;inset:0;z-index:20;align-items:center;justify-content:center;color:#ef4444;font-size:18px;background:rgba(8,12,24,.9);display:none">Failed: No scenes</div>
<div class="known-panel" id="knownPanel"><div class="known-title">■ 已知量</div></div>
<div class="solution-panel" id="panel"></div>
<div class="scene-overlay"><div class="scene-title" id="sceneTitle"></div></div>
<div class="ending-bg" id="endingBg"><div class="ending-card"><h2>✅ 最终答案汇总</h2><div id="endingAnswers"></div></div></div>
<div class="controls" id="controls">
<button id="playBtn">▶</button><button id="rewindBtn">⏮</button>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<span class="time-label" id="timeLabel">0:00 / 3:00</span><button class="spd" id="speedBtn">1×</button></div></div>
<script>
(function(){
'use strict';
const _DEFAULTS = {m:2, theta:37, L:3, mu:0.2, g:10};
const _IN = (typeof __INJECTED_PARAMS__ !== 'undefined') ? __INJECTED_PARAMS__ : {};
const P = {
  m:     _IN.m ?? _DEFAULTS.m,
  theta: _IN.theta ?? _DEFAULTS.theta,
  L:     _IN.L ?? _DEFAULTS.L,
  mu:    _IN.mu ?? _DEFAULTS.mu,
  g:     _IN.g ?? _DEFAULTS.g,
};
const _rad = P.theta * Math.PI / 180;
P.sin = Math.sin(_rad); P.cos = Math.cos(_rad);
P.G=P.m*P.g;P.Gp=P.G*P.sin;P.Gpp=P.G*P.cos;P.N=P.Gpp;P.f=P.mu*P.N;
P.a_smooth=P.g*P.sin;P.v_smooth=Math.sqrt(2*P.a_smooth*P.L);
P.v_rough=Math.sqrt(2*(P.Gp-P.f)*P.L/P.m);
const CX=150,CY=510,SL=460,ANG=P.theta*Math.PI/180;
const TOTAL=10800,FPS=60;

// ── 积木库 ──
const _phases=_IN._phases||[];
const _hasSlope=_phases.includes('slope');
const _hasRough=_phases.includes('rough_surface');
const _goals=_IN._goals||[];
const _has=(g)=>_goals.includes(g);

const _BRICKS={
  intro:{title:_hasRough?'斜面+摩擦力':'光滑斜面',dur:.06,goals:[],layers:['bg','env','object','title','known'],
    physics:()=>({p:0,x:0,v:0,Ek:0,Ep:0,Q:0})},
  forces:{title:'受力分析',dur:.08,goals:['force_analysis'],layers:['bg','env','object','forces','title'],
    physics:()=>({p:0,x:0,v:0,Ek:0,Ep:0,Q:0})},
  slide_sm:{title:'光滑斜面下滑',dur:.12,goals:['velocity','velocity_bottom'],
    layers:['bg','env','object','v_arrow','data','title'],physics:(p)=>(function(mu){
      var x=p*P.L,v=Math.sqrt(2*P.g*(P.sin-mu*P.cos)*x);return{p,x,v,Ek:0.5*P.m*v*v,Ep:P.G*(x*P.sin),Q:mu*P.G*P.cos*x};
    })(0),requires:'hasSlope'},
  hilight:{title:'底部速度',dur:.05,goals:['velocity_bottom'],layers:['bg','env','object','v_arrow','data','title','hilight'],
    physics:()=>{var x=P.L,v=P.v_smooth;return{p:1,x,v,Ek:0.5*P.m*v*v,Ep:0,Q:0}}},
  sol_sm_vel:{title:'求光滑面速度',dur:.07,goals:['velocity_bottom'],layers:['bg','env','object','title','panel'],
    physics:()=>{var x=P.L,v=P.v_smooth;return{p:1,x,v,Ek:0.5*P.m*v*v,Ep:0,Q:0}},
    transIn:'由动能定理求速度',requires:'hasSlope',
    steps:{title:'光滑面速度',items:['a = g·sinθ = ${P.a_smooth.toFixed(2)} m/s²','v² = 2aL → v = √(2×${P.a_smooth.toFixed(2)}×${P.L}) = ${P.v_smooth.toFixed(2)}','v = ${P.v_smooth.toFixed(2)} m/s'],
    answer:'v = ${P.v_smooth.toFixed(2)} m/s'},
    answerItems:['v = ${P.v_smooth.toFixed(2)} m/s']},
  trans_rough:{title:'粗糙斜面',dur:.03,goals:['friction','velocity'],layers:['bg','trans'],requires:'hasRough'},
  slide_rh:{title:'粗糙斜面下滑',dur:.12,goals:['friction','velocity'],layers:['bg','env','object','v_arrow','data','title'],
    physics:(p)=>(function(mu){var x=p*P.L,v=Math.sqrt(2*P.g*(P.sin-mu*P.cos)*x);return{p,x,v,Ek:0.5*P.m*v*v,Ep:P.G*(x*P.sin),Q:mu*P.G*P.cos*x};})(P.mu),requires:'hasRough'},
  sol_friction:{title:'求摩擦力',dur:.06,goals:['friction'],layers:['bg','env','object','forces','friction_arrow','title','panel'],requires:'hasRough',
    physics:()=>{var x=P.L,v=P.v_rough;return{p:1,x,v,Ek:0.5*P.m*v*v,Ep:0,Q:P.f*P.L};},
    transIn:'分析摩擦力',
    steps:{title:'摩擦力大小',items:['f = μmg·cosθ','f = ${P.mu}×${P.G.toFixed(1)}×${P.cos.toFixed(1)}','f = ${P.f.toFixed(2)} N'],
    answer:'f = ${P.f.toFixed(2)} N'},
    answerItems:['f = ${P.f.toFixed(2)} N']},
  sol_rh_vel:{title:'求粗糙面速度',dur:.06,goals:['velocity'],layers:['bg','env','object','v_arrow','forces','friction_arrow','title','panel'],requires:'hasRough',
    physics:()=>{var x=P.L,v=P.v_rough;return{p:1,x,v,Ek:0.5*P.m*v*v,Ep:0,Q:P.f*P.L};},
    transIn:'由动能定理求速度',
    steps:{title:'粗糙面速度',items:['W合 = (mg·sinθ−f)·L = (${P.Gp.toFixed(1)}−${P.f.toFixed(2)})×${P.L}','= ${((P.Gp-P.f)*P.L).toFixed(2)} J → v² = ${(2*(P.Gp-P.f)*P.L/P.m).toFixed(2)}','v = ${P.v_rough.toFixed(2)} m/s'],
    answer:'v ≈ ${P.v_rough.toFixed(2)} m/s'},
    answerItems:['v ≈ ${P.v_rough.toFixed(2)} m/s']},
  ending:{title:'答案汇总',dur:.06,goals:[],layers:['bg','ending']}
};

// ── 编排引擎 ──
function composeScenes(goals,phases){
  var hasSlope=phases.includes('slope'),hasRough=phases.includes('rough_surface');
  var list=['intro','forces'];
  if(hasSlope){
    list.push('slide_sm');
    if(_has('velocity_bottom')){list.push('hilight','sol_sm_vel');}
  }
  if(hasRough){
    list.push('trans_rough','slide_rh');
    if(_has('friction'))list.push('sol_friction');
    if(_has('velocity'))list.push('sol_rh_vel');
  }
  list.push('ending');
  return list;
}
function allocateTime(brickIds){
  var totalDur=0,i,b;
  for(i=0;i<brickIds.length;i++){b=_BRICKS[brickIds[i]];if(b)totalDur+=b.dur;}
  var cursor=0,scenes=[];
  for(i=0;i<brickIds.length;i++){
    b=_BRICKS[brickIds[i]];if(!b)continue;
    var w=b.dur/totalDur;
    scenes.push({id:brickIds[i],title:b.title,s:cursor,e:cursor+w,layers:b.layers,physics:b.physics,
      steps:b.steps,transIn:b.transIn,answerItems:b.answerItems,requires:b.requires});
    cursor+=w;
  }
  return scenes;
}
var brickIds=composeScenes(_goals,_phases);
var SCENES=allocateTime(brickIds);
SCENES.forEach(function(s){s.sf=Math.floor(s.s*TOTAL);s.ef=Math.floor(s.e*TOTAL);s.dur=s.ef-s.sf});

function slopeXY(p){return{x:CX+p*SL*Math.cos(ANG),y:CY-p*SL*Math.sin(ANG)};}

const R={ctx:null,init(c){this.ctx=c.getContext('2d');},
rc(x,y,w,h,r){var ctx=this.ctx;if(r>w/2)r=w/2;if(r>h/2)r=h/2;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();},
arrow(x1,y1,x2,y2,c,w){var ctx=this.ctx,a=Math.atan2(y2-y1,x2-x1),hl=9,ha=.5;ctx.strokeStyle=c;ctx.lineWidth=w||2.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(a-ha),y2-hl*Math.sin(a-ha));ctx.lineTo(x2-hl*Math.cos(a+ha),y2-hl*Math.sin(a+ha));ctx.closePath();ctx.fill();},

render(scene,ph,frame){
  var ctx=this.ctx,layers=scene.layers||['bg'],pr=ph.p,pos=slopeXY(pr),bx=pos.x,by=pos.y;
  ctx.clearRect(0,0,960,640);
  if(layers.includes('bg')){
    var g=ctx.createRadialGradient(480,320,0,480,320,500);g.addColorStop(0,'#0f172a');g.addColorStop(.6,'#0a0e17');g.addColorStop(1,'#060a0f');ctx.fillStyle=g;ctx.fillRect(0,0,960,640);
  }
  if(layers.includes('env')){
    ctx.strokeStyle='rgba(71,85,105,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(960,CY);ctx.stroke();
    ctx.strokeStyle='rgba(148,163,184,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+SL*Math.cos(ANG),CY-SL*Math.sin(ANG));ctx.lineTo(CX,CY-SL*Math.sin(ANG));ctx.closePath();ctx.stroke();ctx.fillStyle='rgba(148,163,184,.03)';ctx.fill();
  }
  if(layers.includes('object')){
    ctx.save();ctx.fillStyle='#60a5fa';ctx.shadowColor='rgba(96,165,250,.15)';ctx.shadowBlur=8;ctx.fillRect(bx-12,by-12,24,24);ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.15)';ctx.strokeRect(bx-12,by-12,24,24);ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('m',bx,by);ctx.restore();
  }
  if(layers.includes('v_arrow')&&ph.v>.05){
    var va=-Math.PI/2+ANG;this.arrow(bx,by,bx+ph.v*6*Math.cos(va),by-ph.v*6*Math.sin(va),'rgba(103,232,249,.6)',2);ctx.fillStyle='#67e8f9';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('v='+ph.v.toFixed(2),bx+ph.v*6*Math.cos(va)+8,by-ph.v*6*Math.sin(va));
  }
  if(layers.includes('forces')){
    var al=40;this.arrow(bx,by,bx,by+al,'rgba(96,165,250,.6)',2);ctx.fillStyle='rgba(96,165,250,.6)';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('G',bx-14,by+al*.5);
  }
  if(layers.includes('friction_arrow')){
    var fal=35,fa=Math.PI/2+ANG;
    this.arrow(bx,by,bx+fal*Math.cos(fa),by+fal*Math.sin(fa),'rgba(239,68,68,.7)',2.5);
    ctx.fillStyle='rgba(239,68,68,.8)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    var flx=bx+fal*Math.cos(fa)+16,fy=by+fal*Math.sin(fa)*.5;
    ctx.fillText('f='+P.f.toFixed(2)+'N',flx,fy);
  }
  if(layers.includes('data')&&ph.v>.1){
    ctx.save();this.rc(20,20,175,100,8);ctx.fillStyle='rgba(10,15,25,.72)';ctx.fill();ctx.fillStyle='#94a3b8';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('■ 数据',30,28);
    var its=[['v',ph.v.toFixed(2)+'m/s','#67e8f9'],['Ek',ph.Ek.toFixed(2)+'J','#34d399'],['Ep',ph.Ep.toFixed(2)+'J','#f97316']];
    its.forEach(function(it,i){ctx.fillStyle='#64748b';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(it[0],30,50+i*18);ctx.fillStyle=it[2];ctx.textAlign='right';ctx.fillText(it[1],185,50+i*18)});ctx.restore();
  }
  if(layers.includes('hilight')){
    ctx.save();ctx.fillStyle='rgba(34,197,94,.85)';ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=8;ctx.fillText('v = '+P.v_smooth.toFixed(2)+' m/s',480,300);ctx.shadowBlur=0;ctx.restore();
  }
  if(layers.includes('title')){
    var t=scene.title;if(t){ctx.save();ctx.font='bold 14px sans-serif';ctx.fillStyle='rgba(10,15,25,.5)';this.rc(30,24,ctx.measureText(t).width+40,34,8);ctx.fill();ctx.fillStyle='#e2e8f0';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,480,41);ctx.restore();}
  }
  // 过渡文字
  if(scene.transIn){
    var prog=(frame||FC.frame)/TOTAL;
    var sp=(prog-scene.s)/(scene.e-scene.s);
    if(sp<.15){var a=sp<.075?sp*13.3:(1-(sp-.075)*13.3);ctx.save();ctx.globalAlpha=Math.min(a,1)*.4;ctx.fillStyle='#000';ctx.fillRect(0,0,960,640);ctx.globalAlpha=1;ctx.fillStyle='#e2e8f0';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(scene.transIn,480,320);ctx.restore();}
  }
}};
})();
</script></body></html>
