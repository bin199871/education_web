<body><div class="app" id="app">
<div class="stars" id="stars"></div><canvas id="mainCanvas" width="960" height="640"></canvas>
<div id="emptyHint" style="display:none;position:absolute;inset:0;z-index:20;align-items:center;justify-content:center;color:#ef4444;font-size:18px;background:rgba(8,12,24,.9);display:none">Failed: No scenes</div>

</div></div>
<script>
(function(){
'use strict';
const _DEFAULTS={Um:311,T:0.02,n1:1000,n2:100,R:10};
const _IN=(typeof __INJECTED_PARAMS__!=='undefined')?__INJECTED_PARAMS__:{};
const P={Um:_IN.Um??_DEFAULTS.Um,T:_IN.T??_DEFAULTS.T,n1:_IN.n1??_DEFAULTS.n1,n2:_IN.n2??_DEFAULTS.n2,R:_IN.R??_DEFAULTS.R};
P.f=1/P.T;P.omega=2*Math.PI*P.f;
P.Ueff=P.Um/Math.sqrt(2);
P.U2=P.Ueff*P.n2/P.n1;
P.I2=P.U2/P.R;
P.I1=P.I2*P.n2/P.n1;
P.P2=P.U2*P.I2;P.P1=P.P2;
const TOTAL=10800,FPS=60;
const _goals=_IN._goals||[];const _has=(g)=>_goals.includes(g);
const _BRICKS={
  intro:{title:'交流电波形',dur:.07,goals:[],layers:['bg','env','wave','title','known'],physics:()=>({p:0,t:0})},
  sol_freq:{title:'求频率和角频率',dur:.08,goals:['ac_freq','ac_angular_freq'],layers:['bg','env','wave','title','panel'],
    physics:()=>({p:1,t:0}),transIn:'频率与周期关系',
    steps:{title:'求频率和角频率',items:['f = 1/T = 1/${P.T}','f = ${P.f.toFixed(2)} Hz','ω = 2πf = 2π×${P.f.toFixed(2)}','ω = ${P.omega.toFixed(2)} rad/s'],answer:'f = ${P.f.toFixed(2)} Hz, ω = ${P.omega.toFixed(2)} rad/s'},
    answerItems:['f = ${P.f.toFixed(2)} Hz','ω = ${P.omega.toFixed(2)} rad/s']},
  sol_eff:{title:'求有效值',dur:.07,goals:['ac_effective'],layers:['bg','env','wave','eff_marker','title','panel'],
    physics:()=>({p:1,t:0}),transIn:'正弦交流电有效值',
    steps:{title:'求电压有效值',items:['U_eff = U_m/√2','U_eff = ${P.Um}/√2','U_eff = ${P.Ueff.toFixed(1)} V'],answer:'U_eff = ${P.Ueff.toFixed(1)} V'},
    answerItems:['U_eff = ${P.Ueff.toFixed(1)} V']},
  transformer:{title:'变压器',dur:.12,goals:['trans_voltage','trans_current','trans_power'],layers:['bg','transformer','data','title'],
    physics:function(p){return{p,u2:P.Ueff*p,i2:P.I2*p,i1:P.I1*p};}},
  sol_voltage:{title:'求副线圈电压',dur:.08,goals:['trans_voltage'],layers:['bg','transformer','title','panel'],
    physics:()=>({p:1,u2:P.U2,i2:P.I2,i1:P.I1}),transIn:'变压器电压关系',
    steps:{title:'求副线圈电压',items:['U₁/U₂ = n₁/n₂','U₂ = (n₂/n₁)·U₁ = (${P.n2}/${P.n1})×${P.Ueff.toFixed(1)}','U₂ = ${P.U2.toFixed(2)} V'],answer:'U₂ = ${P.U2.toFixed(2)} V'},
    answerItems:['U₂ = ${P.U2.toFixed(2)} V']},
  sol_current:{title:'求电流',dur:.08,goals:['trans_current'],layers:['bg','transformer','current_arrows','title','panel'],
    physics:()=>({p:1,u2:P.U2,i2:P.I2,i1:P.I1}),transIn:'欧姆定律 + 电流关系',
    steps:{title:'求电流',items:['I₂ = U₂/R = ${P.U2.toFixed(2)}/${P.R}','I₂ = ${P.I2.toFixed(3)} A','I₁/I₂ = n₂/n₁ → I₁ = (n₂/n₁)·I₂','I₁ = ${P.I1.toFixed(4)} A'],answer:'I₁ = ${P.I1.toFixed(4)} A, I₂ = ${P.I2.toFixed(3)} A'},
    answerItems:['I₁ = ${P.I1.toFixed(4)} A','I₂ = ${P.I2.toFixed(3)} A']},
  sol_power:{title:'求功率',dur:.07,goals:['trans_power'],layers:['bg','transformer','title','panel'],
    physics:()=>({p:1,u2:P.U2,i2:P.I2,i1:P.I1}),transIn:'理想变压器功率',
    steps:{title:'求功率',items:['P₂ = U₂·I₂ = ${P.U2.toFixed(2)}×${P.I2.toFixed(3)}','P₂ = ${P.P2.toFixed(2)} W','P₁ = P₂(理想变压器)','P₁ = ${P.P1.toFixed(2)} W'],answer:'P₁ = P₂ = ${P.P1.toFixed(2)} W'},
    answerItems:['P = ${P.P1.toFixed(2)} W']},
  ending:{title:'答案汇总',dur:.05,goals:[],layers:['bg','ending']}
};
function composeScenes(goals){
  var list=['intro'];
  if(_has('ac_freq')||_has('ac_angular_freq'))list.push('sol_freq');
  if(_has('ac_effective'))list.push('sol_eff');
  if(_has('trans_voltage')||_has('trans_current')||_has('trans_power'))list.push('transformer');
  if(_has('trans_voltage'))list.push('sol_voltage');
  if(_has('trans_current'))list.push('sol_current');
  if(_has('trans_power'))list.push('sol_power');
  list.push('ending');return list;
}
function allocateTime(brickIds){
  var td=0,i,b;for(i=0;i<brickIds.length;i++){b=_BRICKS[brickIds[i]];if(b)td+=b.dur;}
  var c=0,ss=[];for(i=0;i<brickIds.length;i++){
    b=_BRICKS[brickIds[i]];if(!b)continue;
    var w=b.dur/td;ss.push({id:brickIds[i],title:b.title,s:c,e:c+w,layers:b.layers,physics:b.physics,steps:b.steps,transIn:b.transIn,answerItems:b.answerItems});c+=w;
  }return ss;
}
var SCENES=allocateTime(composeScenes(_goals));
SCENES.forEach(function(s){s.sf=Math.floor(s.s*TOTAL);s.ef=Math.floor(s.e*TOTAL);s.dur=s.ef-s.sf});

// 波形参数
const WX=80,WY=300,WW=500,WH=200,W_CX=WX+WW/2,W_CY=WY+WH/2;
const TX=650,TY=200,TW=260,TH=280; // 变压器区域

const R={ctx:null,init(c){this.ctx=c.getContext('2d');},
rc(x,y,w,h,r){var ctx=this.ctx;if(r>w/2)r=w/2;if(r>h/2)r=h/2;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();},
arrow(x1,y1,x2,y2,c,w){var ctx=this.ctx,a=Math.atan2(y2-y1,x2-x1),hl=7,ha=.5;ctx.strokeStyle=c;ctx.lineWidth=w||2;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(a-ha),y2-hl*Math.sin(a-ha));ctx.lineTo(x2-hl*Math.cos(a+ha),y2-hl*Math.sin(a+ha));ctx.closePath();ctx.fill();},
render(scene,st,frame){
  var ctx=this.ctx,layers=scene.layers||['bg'];
  ctx.clearRect(0,0,960,640);
  if(layers.includes('bg')){var g=ctx.createRadialGradient(480,320,0,480,320,500);g.addColorStop(0,'#0f172a');g.addColorStop(.6,'#0a0e17');g.addColorStop(1,'#060a0f');ctx.fillStyle=g;ctx.fillRect(0,0,960,640);}
  if(layers.includes('env')){
    // 边框和标题
    ctx.strokeStyle='rgba(148,163,184,.15)';ctx.lineWidth=1;ctx.strokeRect(WX,WY,WW,WH);
    ctx.fillStyle='rgba(148,163,184,.4)';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('u-t 波形',WX+6,WY+4);
    // 坐标轴
    ctx.strokeStyle='rgba(148,163,184,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(WX,W_CY);ctx.lineTo(WX+WW,W_CY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W_CX,WY);ctx.lineTo(W_CX,WY+WH);ctx.stroke();
    ctx.fillStyle='rgba(148,163,184,.4)';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('t',WX+WW-4,W_CY+4);
    ctx.fillStyle='rgba(148,163,184,.4)';ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText('u',W_CX-6,WY-4);
    // Um标注
    ctx.fillStyle='rgba(251,191,36,.5)';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('U_m='+P.Um+'V',W_CX+10,WY+10);
    ctx.strokeStyle='rgba(251,191,36,.2)';ctx.setLineDash([3,3]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W_CX,WY+10);ctx.lineTo(W_CX+WW-10,WY+10);ctx.stroke();ctx.setLineDash([]);
    // T标注
    ctx.fillStyle='rgba(96,165,250,.5)';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
    var endX=WX+WW;ctx.fillText('T='+P.T+'s',(W_CX+endX)/2,W_CY+6);
    ctx.strokeStyle='rgba(96,165,250,.2)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W_CX,W_CY+20);ctx.lineTo(endX,W_CY+20);ctx.moveTo(W_CX,W_CY+15);ctx.lineTo(W_CX,W_CY+25);ctx.moveTo(endX,W_CY+15);ctx.lineTo(endX,W_CY+25);ctx.stroke();
  }
  if(layers.includes('wave')){
    // 正弦波
    ctx.strokeStyle='rgba(251,191,36,.7)';ctx.lineWidth=2;ctx.beginPath();
    for(var xi=0;xi<=WW;xi+=2){
      var angle=2*Math.PI*xi/WW;
      var yi=W_CY-WH/2*Math.sin(angle)*0.8;
      if(xi===0)ctx.moveTo(WX+xi,yi);else ctx.lineTo(WX+xi,yi);
    }ctx.stroke();
    // 实时（动画中用当前相位）
    var phase=(frame%FPS)/FPS*2*Math.PI;
    ctx.fillStyle='rgba(251,191,36,.4)';ctx.beginPath();ctx.arc(WX+phase/(2*Math.PI)*WW,W_CY-WH/2*Math.sin(phase)*0.8,5,0,Math.PI*2);ctx.fill();
  }
  if(layers.includes('eff_marker')){
    // U_eff 虚线标注
    var effH=WH*0.8*P.Ueff/P.Um;
    ctx.strokeStyle='rgba(34,197,94,.5)';ctx.setLineDash([4,4]);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(WX,W_CY-effH);ctx.lineTo(WX+WW,W_CY-effH);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(WX,W_CY+effH);ctx.lineTo(WX+WW,W_CY+effH);ctx.stroke();
    ctx.fillStyle='rgba(34,197,94,.6)';ctx.font='11px sans-serif';ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText('U_eff='+P.Ueff.toFixed(1)+'V',WX+WW-4,W_CY-effH-4);
  }
  if(layers.includes('transformer')){
    // 变压器铁芯（矩形框）
    ctx.strokeStyle='rgba(148,163,184,.4)';ctx.lineWidth=2;
    var cx=TX+TW/2,cy=TY+TH/2;
    ctx.strokeRect(TX+40,TY,180,TH);
    // 原线圈（左侧绕线）
    ctx.strokeStyle='rgba(251,191,36,.6)';ctx.lineWidth=2;
    for(var wi=0;wi<8;wi++){var wy=TY+30+wi*(TH-60)/8;ctx.beginPath();ctx.arc(TX+40,wy,20,Math.PI/2,3*Math.PI/2,true);ctx.stroke();}
    ctx.fillStyle='rgba(251,191,36,.7)';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('n₁='+P.n1,TX+20,cy-20);
    // 副线圈（右侧绕线）
    ctx.strokeStyle='rgba(239,68,68,.6)';ctx.lineWidth=2;
    for(var wi=0;wi<8;wi++){var wy=TY+30+wi*(TH-60)/8;ctx.beginPath();ctx.arc(TX+220,wy,20,3*Math.PI/2,Math.PI/2,true);ctx.stroke();}
    ctx.fillStyle='rgba(239,68,68,.7)';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('n₂='+P.n2,TX+240,cy-20);
    // 铁芯标注
    ctx.fillStyle='rgba(148,163,184,.3)';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('铁芯',cx,TY+TH-18);
    // 电源符号（左侧）
    ctx.fillStyle='rgba(251,191,36,.5)';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('u₁',TX-10,cy);
    // 负载（右侧）
    ctx.save();
    ctx.strokeStyle='rgba(239,68,68,.4)';ctx.lineWidth=2;ctx.fillStyle='rgba(239,68,68,.12)';
    var rx=TX+190,ry=cy-8,rw=40,rh=16;
    ctx.fillRect(rx,ry,rw,rh);ctx.strokeRect(rx,ry,rw,rh);
    ctx.fillStyle='rgba(239,68,68,.6)';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('R',rx+rw/2,ry+rh/2);
    ctx.restore();
    // 数据面板
    if(st.p>0.01&&layers.includes('data')){
      ctx.save();this.rc(20,20,185,95,8);ctx.fillStyle='rgba(10,15,25,.72)';ctx.fill();
      ctx.fillStyle='#94a3b8';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('■ 数据',30,28);
      ctx.fillStyle='#fbbf24';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('U₂='+(st.u2||0).toFixed(2)+'V',30,48);
      ctx.fillStyle='#67e8f9';ctx.textAlign='left';ctx.fillText('I₂='+(st.i2||0).toFixed(4)+'A',30,66);
      ctx.fillStyle='#34d399';ctx.textAlign='left';ctx.fillText('I₁='+(st.i1||0).toFixed(4)+'A',30,84);ctx.restore();
    }
  }
  // 电流方向箭头（简化的环形示意）
  if(layers.includes('current_arrows')){
    ctx.save();
    this.arrow(TX-20,350,TX-10,350,'rgba(251,191,36,.5)',2);
    ctx.fillStyle='rgba(251,191,36,.5)';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText('I₁',TX-25,350);
    this.arrow(TX+230,350,TX+250,350,'rgba(239,68,68,.5)',2);
    ctx.fillStyle='rgba(239,68,68,.5)';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('I₂',TX+255,350);
    ctx.restore();
  }
  if(layers.includes('title')){var t=scene.title;if(t){ctx.save();ctx.font='bold 14px sans-serif';ctx.fillStyle='rgba(10,15,25,.5)';this.rc(30,24,ctx.measureText(t).width+40,34,8);ctx.fill();ctx.fillStyle='#e2e8f0';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,480,41);ctx.restore();}}

window.onerror = function(msg,url,l,c,e){

// ================================================================
//  1. 帧控制器 FC
// ================================================================
const FC={
  frame:0,total:10800,fps:60,isPlay:false,isComp:false,
  _animId:null,_lastT:0,_slow:null,
  _onFrame:null,_onDone:null,_onPause:null,
  _effSpd(){
    let s=this.speed||1;
    if(this._slow&&this.frame>=this._slow[0]&&this.frame<this._slow[1])s*=this._slow[2];
    return s;
  },
  _loop(ts){
    if(!this._lastT)this._lastT=ts;
    const dt=ts-this._lastT;this._lastT=ts;
    if(this.isPlay){
      this.frame=Math.min(this.frame+(dt/1000)*this.fps*this._effSpd(),this.total-1);
      try{if(this._onFrame)this._onFrame(Math.floor(this.frame));}catch(e){console.error('[loop] onFrame err',e);}
      if(this.frame>=this.total-1){this.isPlay=false;this.isComp=true;if(this._onDone)this._onDone();}
    }
    this._animId=requestAnimationFrame(t=>this._loop(t));
  },
  start(){this._lastT=0;this._animId=requestAnimationFrame(t=>this._loop(t));},
  play(){this.isPlay=true;this.isComp=false;this._lastT=0;},
  pause(){this.isPlay=false;if(this._onPause)this._onPause();},
  toggle(){
    if(this.isComp){this.seek(0);this.play();}
    else if(this.isPlay)this.pause();
    else this.play();
  },
  seek(f){this.frame=Math.max(0,Math.min(f,this.total-1));this.isComp=false;try{if(this._onFrame)this._onFrame(Math.floor(this.frame));}catch(e){console.error('[loop] onFrame err',e);}},
  setSlow(a,b,c){this._slow=[a,b,c||.3]},
  clrSlow(){this._slow=null}
};

// ================================================================
//  2. 场景调度 SD
// ================================================================
const SD={
  cur:null,prev:null,
  get(f){
    const p=f/(FC.total||10800);
    for(let s of SCENES)if(p>=s.s&&p<s.e)return s.id;
    return'ending';
  },
  prog(f,id){
    const s=SCENES.find(x=>x.id===id);if(!s)return 0;
    const r=s.e-s.s;if(r<=0)return 1;
    return Math.min(1,Math.max(0,(f/(FC.total||10800)-s.s)/r));
  },
  def(id){return SCENES.find(x=>x.id===id);},
  update(f){
    this.prev=this.cur;this.cur=this.get(f);
    return{id:this.cur,changed:this.cur!==this.prev};
  }
};

// ================================================================
//  3. 解题面板 Panel
// ================================================================
const Panel={el:null,cur:null,_manual:false,_step:0,
_evalAll(h){return h.replace(/\$\{([^}]+)\}/g,function(m,k){try{return eval(k);}catch(e){console.warn('[eval]',k,e.message);return '['+k+']';}});},
init(){
  this.el=document.getElementById('panel');
  if(this.el)this.el.onclick=function(e){
    if(Panel._manual)Panel._stepClick();
  };
},
_stepClick(){
  if(!this._manual)return;
  var cnt=0;
  if(typeof SCENES!=='undefined'&&SCENES){
    var sc=SCENES.find(function(s){return s.id===Panel.cur;});
    if(sc&&sc.steps)cnt=sc.steps.items.length;
  }
  if(cnt>0&&this._step<cnt+1){this._step++;this._applyStep(cnt);}
  if(this._step>cnt&&this._manual)this._manual=false;
},
_applyStep(cnt){
  if(!this.el)return;
  for(var i=0;i<cnt;i++){var e=document.getElementById('ps_'+i);if(e)e.classList.toggle('visible',i<this._step);}
  var ae=document.getElementById('psa_');if(ae)ae.classList.toggle('visible',this._step>cnt);
},
renderSteps(sc){
  if(!sc||!sc.steps){if(this.el)this.el.classList.remove('visible');this.cur=null;return;}
  var h='<div class="panel-title">'+sc.steps.title+'</div>';
  sc.steps.items.forEach(function(it,i){h+='<div class="step-row" id="ps_'+i+'"><span class="step-badge">'+(i+1)+'</span><span>'+it+'</span></div>';});
  h+='<div class="answer-box" id="psa_"><span class="answer-text">'+sc.steps.answer+'</span></div>';
  this.el.innerHTML=h;
},
update(sid,prog,sc){
  if(!sc||!sc.steps){if(this.cur){if(this.el)this.el.classList.remove('visible');this.cur=null;}return;}
  if(sid!==this.cur){
    this._manual=sid.indexOf('sol_')===0;
    this._step=0;
    this.cur=sid;this.renderSteps(sc);if(this.el)this.el.classList.add('visible');
    for(var i=0;i<sc.steps.items.length;i++){var e=document.getElementById('ps_'+i);if(e){var txt=this._evalAll(e.innerHTML);e.innerHTML=_convertMath(txt);}}
    var ae=document.getElementById('psa_');if(ae)ae.innerHTML=this._evalAll(ae.innerHTML);
    _renderMath(this.el);
    // 解题场景：添加点击翻步、初始隐藏步骤
    if(this._manual && this.el){
      for(var ri=0;ri<sc.steps.items.length;ri++){
        var re=document.getElementById('ps_'+ri);
        if(re)re.onclick=function(e){e.stopPropagation();Panel._stepClick();};
      }
      var ae2=document.getElementById('psa_');
      if(ae2)ae2.onclick=function(e){e.stopPropagation();Panel._stepClick();};
    }
    this._applyStep(sc.steps.items.length);
  }
  if(!this._manual){
    // 自动模式：随进度渐显
    var cnt=sc.steps.items.length,vis=Math.min(Math.floor(prog/.85*cnt),cnt);
    for(var i=0;i<cnt;i++){var e=document.getElementById('ps_'+i);if(e)e.classList.toggle('visible',i<vis);}
    var ae=document.getElementById('psa_');if(ae)ae.classList.toggle('visible',prog>.85);
  }
}};

// ================================================================
//  4. 答案汇总 End
// ================================================================
const End={el:null,_inited:false,
  init(){
    this.el=document.getElementById('endingBg');
    var c=document.getElementById('endingAnswers');if(!c||this._inited)return;
    var items=[];
    for(var i=0;i<SCENES.length;i++){var s=SCENES[i];
      if(s.answerItems){
        s.answerItems.forEach(function(ai){var val=ai.replace(/\$\{([^}]+)\}/g,function(m,k){try{return eval(k);}catch(e){console.warn('[eval]',k,e.message);return '['+k+']';}});items.push('<div class="ending-item"><span class="l">'+(s.title||'')+'</span><span class="r">'+val+'</span></div>');});
      }
    }
    c.innerHTML=items.length?items.join(''):'暂无答案';this._inited=true;
  },
  update(id,prog,sc){
    if(id!=='ending'){if(this.el)this.el.classList.remove('visible');return}
    if(!this._inited)this.init();
    var a=Math.min(1,(prog||0)/.6);if(this.el){this.el.style.opacity=a;this.el.classList.add('visible');}
  }
};

// ================================================================
//  5. 已知量面板 KP
// ================================================================
const KP={el:null,_inited:false,
  init(content){
    if(this._inited)return;

// ================================================================
//  6. 控制栏 UI
// ================================================================
const UI={_ready:false,_navDots:null,_solScenes:[],
  _initNav(){
    this._solScenes=SCENES?SCENES.filter(function(s){return s.id&&s.id.indexOf('sol_')===0;}):[];
    if(this._solScenes.length<2)return;
    var nav=document.createElement('div');nav.style.cssText='display:flex;gap:6px;align-items:center;margin:0 4px;flex-shrink:0';
    for(var i=0;i<this._solScenes.length;i++){
      var dot=document.createElement('button');
      dot.style.cssText='width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.3);background:transparent;cursor:pointer;padding:0;transition:all .2s';
      dot.title=(i+1)+'. '+this._solScenes[i].title;
      dot.onclick=function(idx){return function(){FC.seek(UI._solScenes[idx].sf);UI.sync();};}(i);
      nav.appendChild(dot);
    }
    this._navDots=nav.children;
    // Insert after play button
    this.pb.parentNode.insertBefore(nav,this.pb.nextSibling);
  },
  init(){
    this.pb=document.getElementById('playBtn');this.rw=document.getElementById('rewindBtn');
    this.pr=document.getElementById('progressBar');this.pf=document.getElementById('progressFill');
    this.tl=document.getElementById('timeLabel');this.sp=document.getElementById('speedBtn');
    if(!this.pb||!this.pr)return;this._ready=true;
    this._initNav();
    this.pb.onclick=()=>{FC.toggle();this.upd()};this.rw.onclick=()=>{FC.seek(0);this.sync()};
    this.pr.onclick=e=>{var r=this.pr.getBoundingClientRect(),p=Math.max(0,Math.min((e.clientX-r.left)/r.width,1));FC.seek(Math.floor(p*FC.total));this.sync()};
    this.sp.onclick=()=>{var ss=[.5,1,1.5,2,3,4],ci=ss.indexOf(FC.speed);FC.speed=ss[(ci+1)%ss.length];this.sp.textContent=FC.speed+'×'};
    document.addEventListener('keydown',e=>{switch(e.code){case'Space':e.preventDefault();FC.toggle();this.upd();break;case'ArrowRight':FC.seek(FC.frame+5*FC.fps);this.sync();break;case'ArrowLeft':FC.seek(FC.frame-5*FC.fps);this.sync();break;case'KeyR':FC.seek(0);this.sync();break}});
  },
  upd(){if(!this._ready||!this.pb)return;if(FC.isComp)this.pb.textContent='↺';else if(FC.isPlay)this.pb.textContent='⏸';else this.pb.textContent='▶'},
  sync(){this.upd();this.updProg(FC.frame,FC.total)},
  updProg(f,t){
    if(!this._ready)return;
    if(this.pf)this.pf.style.width=Math.min((f/t)*100,100)+'%';
    if(this.tl){var cs=Math.floor(f/FC.fps),ts=Math.floor(t/FC.fps);this.tl.textContent=String(Math.floor(cs/60))+':'+String(cs%60).padStart(2,'0')+' / '+String(Math.floor(ts/60))+':'+String(ts%60).padStart(2,'0');}
    // 更新导航点高亮
    if(this._navDots&&this._navDots.length>0){
      var sid=SD?SD.cur:null;
      for(var di=0;di<this._navDots.length;di++){
        var sc=this._solScenes[di];
        if(sc&&sc.id===sid)this._navDots[di].style.background='rgba(255,255,255,.7)';
        else this._navDots[di].style.background='transparent';
      }
    }
  }
};

// ================================================================

// ================================================================
var _renderMath = function(el){
  try{if(window.renderMathInElement)renderMathInElement(el,{delimiters:[{left:'$',right:'$',display:false}]});}catch(e){}
};
var _convertMath=function(t){
  if(!t)return t;
  if(/[√²³×θΔπα½≥≤≈]/.test(t)){
    return '$'+t+'$';
  }
  return t;
};

(function(){var e=document.getElementById('stars');if(!e)return;for(var i=0;i<60;i++){var s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.setProperty('--d',(2+Math.random()*4)+'s');var sz=1+Math.random()*2;s.style.width=sz+'px';s.style.height=sz+'px';e.appendChild(s);}})();

// ================================================================
//  9. onFrame 主循环
// ================================================================
function onFrame(frame){
  const ref=SD.update(frame);
  const sceneId=ref.id,changed=ref.changed;
  const prog=SD.prog(frame,sceneId);
  const scene=SCENES.find(s=>s.id===sceneId);
  if(!scene)return;
  const st=scene.physics?scene.physics(prog):{};

  if(changed){
    KP.update(sceneId);
    if(scene.steps)FC.setSlow(scene.sf,scene.ef,.35);
    else FC.clrSlow();
  }

  try{R.render(scene,st,frame);}catch(e){console.error('[render]',e);}
  try{Panel.update(sceneId,prog,scene);}catch(e){console.error('[panel]',e);}
  try{End.update(sceneId,prog,scene);}catch(e){console.error('[end]',e);}
  UI.updProg(frame,FC.total);
}

// ================================================================
//  10. 启动
// ================================================================
FC._onFrame=onFrame;
FC._onDone=()=>{UI.upd()};

if(!SCENES||SCENES.length===0){
  console.error('[core] 场景列表为空');
  var h=document.getElementById('emptyHint');
  if(h)h.style.display='block';
}else{
  Panel.init();
  R.init(document.getElementById('mainCanvas'));
  UI.init();
  FC.start();
  FC.seek(0);
  UI.upd();
}
