<script>
(function(){
'use strict';
const _DEFAULTS={m:0.1,B:0.5,L:1.0,v0:4,R:2};
const _IN=(typeof __INJECTED_PARAMS__!=='undefined')?__INJECTED_PARAMS__:{};
const P={m:_IN.m??_DEFAULTS.m,B:_IN.B??_DEFAULTS.B,L:_IN.L??_DEFAULTS.L,v0:_IN.v0??_DEFAULTS.v0,R:_IN.R??_DEFAULTS.R};
P.E=P.B*P.L*P.v0;P.I=P.E/P.R;P.F=P.B*P.I*P.L;P.a=P.F/P.m;
P.vt=P.v0;P.vmax=10;const TOTAL=10800,FPS=60;
const _goals=_IN._goals||[];const _has=(g)=>_goals.includes(g);
const _BRICKS={
  intro:{title:'导体棒切割',dur:.06,goals:[],layers:['bg','env','title','known'],physics:()=>({x:0,v:P.v0})},
  cutting:{title:'切割磁感线',dur:.25,goals:['induced_emf','induced_current','amp_force','terminal_velocity'],
    layers:['bg','env','object','v_arrow','data','title'],
    physics:function(p){var t=p*5,v=Math.max(P.v0-P.a*t,0),x=P.v0*t-0.5*P.a*t*t;if(v<0.5)v=0;return{x:Math.min(x*2,700),v,E:P.B*P.L*v,I:P.B*P.L*v/P.R,F:P.B*P.I*P.L};}},
  sol_emf:{title:'求感应电动势',dur:.08,goals:['induced_emf'],layers:['bg','env','title','panel'],
    physics:()=>({x:200,v:P.v0,E:P.E,I:P.I,F:P.F}),transIn:'E = BLv',
    steps:{title:'求感应电动势',items:['E = BLv','E = BLv₀ = ${P.B}×${P.L}×${P.v0}','E = ${P.E.toFixed(2)} V'],answer:'E = ${P.E.toFixed(2)} V'},
    answerItems:['E = ${P.E.toFixed(2)} V']},
  sol_current:{title:'求感应电流',dur:.08,goals:['induced_current'],layers:['bg','env','title','panel'],
    physics:()=>({x:200,v:P.v0,E:P.E,I:P.I,F:P.F}),transIn:'I = E/R',
    steps:{title:'求感应电流',items:['I = E/R','I = ${P.E.toFixed(2)}/${P.R} = ${P.I.toFixed(4)} A','I = ${P.I.toFixed(4)} A'],answer:'I = ${P.I.toFixed(4)} A'},
    answerItems:['I = ${P.I.toFixed(4)} A']},
  sol_force:{title:'求安培力',dur:.07,goals:['amp_force'],layers:['bg','env','title','panel'],physics:()=>({x:200,v:P.v0,E:P.E,I:P.I,F:P.F}),transIn:'F = BIL',
    steps:{title:'求安培力',items:['F = BIL','F = ${P.B}×${P.I.toFixed(4)}×${P.L}','F = ${P.F.toFixed(4)} N'],answer:'F = ${P.F.toFixed(4)} N'},
    answerItems:['F = ${P.F.toFixed(4)} N']},
  ending:{title:'答案汇总',dur:.05,goals:[],layers:['bg','ending']}

function composeScenes(goals){var list=['intro','cutting'];if(_has('induced_emf'))list.push('sol_emf');if(_has('induced_current'))list.push('sol_current');if(_has('amp_force'))list.push('sol_force');list.push('ending');return list;}
function allocateTime(brickIds){var td=0,i,b;for(i=0;i<brickIds.length;i++){b=_BRICKS[brickIds[i]];if(b)td+=b.dur;}var c=0,ss=[];for(i=0;i<brickIds.length;i++){b=_BRICKS[brickIds[i]];if(!b)continue;var w=b.dur/td;ss.push({id:brickIds[i],title:b.title,s:c,e:c+w,layers:b.layers,physics:b.physics,steps:b.steps,transIn:b.transIn,answerItems:b.answerItems});c+=w;}return ss;}
var SCENES=allocateTime(composeScenes(_goals));SCENES.forEach(function(s){s.sf=Math.floor(s.s*TOTAL);s.ef=Math.floor(s.e*TOTAL);s.dur=s.ef-s.sf});
const R={ctx:null,init(c){this.ctx=c.getContext('2d');},rc(x,y,w,h,r){var ctx=this.ctx;if(r>w/2)r=w/2;if(r>h/2)r=h/2;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();},
render(scene,st,frame){var ctx=this.ctx,layers=scene.layers||['bg'];ctx.clearRect(0,0,960,640);
  if(layers.includes('bg')){var g=ctx.createRadialGradient(480,320,0,480,320,500);g.addColorStop(0,'#0f172a');g.addColorStop(.6,'#0a0e17');g.addColorStop(1,'#060a0f');ctx.fillStyle=g;ctx.fillRect(0,0,960,640);}
  if(layers.includes('env')){
    ctx.fillStyle='rgba(59,130,246,.03)';ctx.fillRect(100,300,760,60);ctx.strokeStyle='rgba(59,130,246,.1)';ctx.lineWidth=1;ctx.strokeRect(100,300,760,60);
    ctx.fillStyle='rgba(59,130,246,.15)';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('× B',105,305);
    ctx.strokeStyle='rgba(148,163,184,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(100,310);ctx.lineTo(860,310);ctx.moveTo(100,350);ctx.lineTo(860,350);ctx.stroke();
  }
  if(layers.includes('object')&&st.x>0){
    var bx=100+st.x;ctx.save();ctx.fillStyle='#60a5fa';ctx.shadowColor='rgba(96,165,250,.15)';ctx.shadowBlur=8;ctx.fillRect(bx,308,60,44);ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,.15)';ctx.strokeRect(bx,308,60,44);ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('棒',bx+30,330);ctx.restore();}
  if(layers.includes('v_arrow')&&st.v>.05){var bx=100+st.x;
    ctx.save();ctx.strokeStyle='rgba(103,232,249,.6)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(bx+60,330);ctx.lineTo(bx+60+Math.min(st.v*8,60),330);ctx.stroke();
    ctx.fillStyle='#67e8f9';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('v='+st.v.toFixed(1),bx+60+Math.min(st.v*8,60)+2,330);ctx.restore();}
  if(layers.includes('data')&&st.v>.05){ctx.save();this.rc(20,20,200,110,8);ctx.fillStyle='rgba(10,15,25,.72)';ctx.fill();ctx.fillStyle='#94a3b8';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('■ 数据',30,28);
    ctx.fillStyle='#67e8f9';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('v='+st.v.toFixed(2)+'m/s',30,50);
    ctx.fillStyle='#60a5fa';ctx.textAlign='left';ctx.fillText('E='+st.E.toFixed(4)+'V',30,68);
    ctx.fillStyle='#f97316';ctx.textAlign='left';ctx.fillText('I='+st.I.toFixed(4)+'A',30,86);
    ctx.fillStyle='#ef4444';ctx.textAlign='left';ctx.fillText('F='+st.F.toFixed(4)+'N',30,104);ctx.restore();}
  if(layers.includes('title')){var t=scene.title;if(t){ctx.save();ctx.font='bold 14px sans-serif';ctx.fillStyle='rgba(10,15,25,.5)';this.rc(30,24,ctx.measureText(t).width+40,34,8);ctx.fill();ctx.fillStyle='#e2e8f0';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,480,41);ctx.restore();}}
  if(scene.transIn){var sp=(frame/TOTAL-scene.s)/(scene.e-scene.s);if(sp<.15){var a=sp<.075?sp*13.3:(1-(sp-.075)*13.3);ctx.save();ctx.globalAlpha=Math.min(a,1)*.4;ctx.fillStyle='#000';ctx.fillRect(0,0,960,640);ctx.globalAlpha=1;ctx.fillStyle='#e2e8f0';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(scene.transIn,480,320);ctx.restore();}}
}};


(function(){var e=document.getElementById('stars');for(var i=0;i<60;i++){var s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.setProperty('--d',(2+Math.random()*4)+'s');var sz=1+Math.random()*2;s.style.width=sz+'px';s.style.height=sz+'px';e.appendChild(s)}})();

window.onerror = function(msg,url,l,c,e){

// ================================================================
//  1. 帧控制器 FC
// ================================================================
const FC={
  frame:0,total:10800,fps:60,isPlay:false,isComp:false,
  _animId:null,_lastT:0,_slow:null,
  _onFrame:null,_onDone:null,_onPause:null,
  _effSpd(){
    let s=this.speed||1;
    if(this._slow&&this.frame>=this._slow[0]&&this.frame<this._slow[1])s*=this._slow[2];
    return s;
  },
  _loop(ts){
    if(!this._lastT)this._lastT=ts;
    const dt=ts-this._lastT;this._lastT=ts;
    if(this.isPlay){
      this.frame=Math.min(this.frame+(dt/1000)*this.fps*this._effSpd(),this.total-1);
      try{if(this._onFrame)this._onFrame(Math.floor(this.frame));}catch(e){console.error('[loop] onFrame err',e);}
      if(this.frame>=this.total-1){this.isPlay=false;this.isComp=true;if(this._onDone)this._onDone();}
    }
    this._animId=requestAnimationFrame(t=>this._loop(t));
  },
  start(){this._lastT=0;this._animId=requestAnimationFrame(t=>this._loop(t));},
  play(){this.isPlay=true;this.isComp=false;this._lastT=0;},
  pause(){this.isPlay=false;if(this._onPause)this._onPause();},
  toggle(){
    if(this.isComp){this.seek(0);this.play();}
    else if(this.isPlay)this.pause();
    else this.play();
  },
  seek(f){this.frame=Math.max(0,Math.min(f,this.total-1));this.isComp=false;try{if(this._onFrame)this._onFrame(Math.floor(this.frame));}catch(e){console.error('[loop] onFrame err',e);}},
  setSlow(a,b,c){this._slow=[a,b,c||.3]},
  clrSlow(){this._slow=null}
};

// ================================================================
//  2. 场景调度 SD
// ================================================================
const SD={
  cur:null,prev:null,
  get(f){
    const p=f/(FC.total||10800);
    for(let s of SCENES)if(p>=s.s&&p<s.e)return s.id;
    return'ending';
  },
  prog(f,id){
    const s=SCENES.find(x=>x.id===id);if(!s)return 0;
    const r=s.e-s.s;if(r<=0)return 1;
    return Math.min(1,Math.max(0,(f/(FC.total||10800)-s.s)/r));
  },
  def(id){return SCENES.find(x=>x.id===id);},
  update(f){
    this.prev=this.cur;this.cur=this.get(f);
    return{id:this.cur,changed:this.cur!==this.prev};
  }
};

// ================================================================
//  3. 解题面板 Panel
// ================================================================
const Panel={el:null,cur:null,
_evalAll(h){return h.replace(/\$\{([^}]+)\}/g,function(m,k){try{return eval(k);}catch(e){console.warn('[eval]',k,e.message);return '['+k+']';}});},
init(){
  this.el=document.getElementById('panel');
},
renderSteps(sc){
  if(!sc||!sc.steps){if(this.el)this.el.classList.remove('visible');this.cur=null;return;}
  var h='<div class="panel-title">'+sc.steps.title+'</div>';
  sc.steps.items.forEach(function(it,i){h+='<div class="step-row" id="ps_'+i+'"><span class="step-badge">'+(i+1)+'</span><span>'+it+'</span></div>';});
  h+='<div class="answer-box" id="psa_"><span class="answer-text">'+sc.steps.answer+'</span></div>';
  this.el.innerHTML=h;
},
update(sid,prog,sc){
  if(!sc||!sc.steps){if(this.cur){if(this.el)this.el.classList.remove('visible');this.cur=null;}return;}
  if(sid!==this.cur){
    this.cur=sid;this.renderSteps(sc);if(this.el)this.el.classList.add('visible');
    for(var i=0;i<sc.steps.items.length;i++){var e=document.getElementById('ps_'+i);if(e){var txt=this._evalAll(e.innerHTML);e.innerHTML=_convertMath(txt);}}
    var ae=document.getElementById('psa_');if(ae)ae.innerHTML=this._evalAll(ae.innerHTML);
    _renderMath(this.el);
  }
  var cnt=sc.steps.items.length,vis=Math.min(Math.floor(prog/.85*cnt),cnt);
  for(var i=0;i<cnt;i++){var e=document.getElementById('ps_'+i);if(e)e.classList.toggle('visible',i<vis);}
  var ae=document.getElementById('psa_');if(ae)ae.classList.toggle('visible',prog>.85);

// ================================================================
//  4. 答案汇总 End
// ================================================================
const End={el:null,_inited:false,
  init(){
    this.el=document.getElementById('endingBg');

      if(s.answerItems){
        s.answerItems.forEach(function(ai){var val=ai.replace(/\$\{([^}]+)\}/g,function(m,k){try{return eval(k);}catch(e){console.warn('[eval]',k,e.message);return '['+k+']';}});items.push('<div class="ending-item"><span class="l">'+(s.title||'')+'</span><span class="r">'+val+'</span></div>');});
      }

  },
  update(id,prog,sc){

  }
};

// ================================================================
//  5. 已知量面板 KP
// ================================================================

  init(content){

// ================================================================
//  6. 控制栏 UI
// ================================================================
const UI={_ready:false,
  init(){
    this.pb=document.getElementById('playBtn');this.rw=document.getElementById('rewindBtn');

    this.pr.onclick=e=>{var r=this.pr.getBoundingClientRect(),p=Math.max(0,Math.min((e.clientX-r.left)/r.width,1));FC.seek(Math.floor(p*FC.total));this.sync()};
    this.sp.onclick=()=>{var ss=[.5,1,1.5,2],ci=ss.indexOf(FC.speed);FC.speed=ss[(ci+1)%ss.length];this.sp.textContent=FC.speed+'×'};
    document.addEventListener('keydown',e=>{switch(e.code){case'Space':e.preventDefault();FC.toggle();this.upd();break;case'ArrowRight':FC.seek(FC.frame+5*FC.fps);this.sync();break;case'ArrowLeft':FC.seek(FC.frame-5*FC.fps);this.sync();break;case'KeyR':FC.seek(0);this.sync();break}});
  },
  upd(){if(!this._ready||!this.pb)return;if(FC.isComp)this.pb.textContent='↺';else if(FC.isPlay)this.pb.textContent='⏸';else this.pb.textContent='▶'},
  sync(){this.upd();this.updProg(FC.frame,FC.total)},
  updProg(f,t){if(!this._ready)return;if(this.pf)this.pf.style.width=Math.min((f/t)*100,100)+'%';if(this.tl){var cs=Math.floor(f/FC.fps),ts=Math.floor(t/FC.fps);this.tl.textContent=String(Math.floor(cs/60))+':'+String(cs%60).padStart(2,'0')+' / '+String(Math.floor(ts/60))+':'+String(ts%60).padStart(2,'0');}}
};

// ================================================================
//  7. 数学渲染工具
// ================================================================
var _renderMath = function(el){
  try{if(window.renderMathInElement)renderMathInElement(el,{delimiters:[{left:'$',right:'$',display:false}]});}catch(e){}
};
var _convertMath=function(t){
  if(!t)return t;
  if(/[√²³×θΔπα½≥≤≈]/.test(t)){
    return '$'+t+'$';
  }
  return t;
};

// ================================================================
//  8. 星星生成
// ================================================================
(function(){var e=document.getElementById('stars');if(!e)return;for(var i=0;i<60;i++){var s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.setProperty('--d',(2+Math.random()*4)+'s');var sz=1+Math.random()*2;s.style.width=sz+'px';s.style.height=sz+'px';e.appendChild(s);}})();

// ================================================================
//  9. onFrame 主循环
// ================================================================
function onFrame(frame){
  const ref=SD.update(frame);
  const sceneId=ref.id,changed=ref.changed;
  const prog=SD.prog(frame,sceneId);
  const scene=SCENES.find(s=>s.id===sceneId);
  if(!scene)return;
  const st=scene.physics?scene.physics(prog):{};

  if(changed){
    KP.update(sceneId);
    if(scene.steps)FC.setSlow(scene.sf,scene.ef,.35);
    else FC.clrSlow();
  }

  try{R.render(scene,st,frame);}catch(e){console.error('[render]',e);}
  try{Panel.update(sceneId,prog,scene);}catch(e){console.error('[panel]',e);}
  try{End.update(sceneId,prog,scene);}catch(e){console.error('[end]',e);}
  UI.updProg(frame,FC.total);
}

// ================================================================
//  10. 启动
// ================================================================
FC._onFrame=onFrame;
FC._onDone=()=>{UI.upd()};

if(!SCENES||SCENES.length===0){
  console.error('[core] 场景列表为空');
  var h=document.getElementById('emptyHint');
  if(h)h.style.display='block';
}else{
  Panel.init();
  R.init(document.getElementById('mainCanvas'));
  UI.init();
  FC.start();
  FC.seek(0);
  UI.upd();
}
