<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<title>光的折射反射 · 讲解动画</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e1a;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Microsoft YaHei','PingFang SC',sans-serif;padding:10px}
.app{position:relative;width:100%;max-width:960px;aspect-ratio:3/2;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.stars{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) infinite alternate}@keyframes twinkle{0%{opacity:.1}100%{opacity:.8}}
#mainCanvas{position:absolute;inset:0;z-index:1;width:100%;height:100%;display:block}
.solution-panel{position:absolute;right:0;top:50%;transform:translate(100%,-50%);z-index:4;width:270px;max-height:78%;padding:22px 18px;background:rgba(8,12,22,.92);backdrop-filter:blur(16px);border-left:1px solid rgba(255,255,255,.06);border-radius:14px 0 0 14px;overflow-y:auto;transition:transform .55s cubic-bezier(.23,1,.32,1)}
.solution-panel.visible{transform:translate(0,-50%)}
.panel-title{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06);color:#93c5fd}
.step-row{opacity:0;transform:translateX(18px);transition:opacity .4s ease,transform .4s ease;margin-bottom:7px;font-size:13px;line-height:1.6;color:#cbd5e1;display:flex;align-items:flex-start;gap:6px}
.step-row.visible{opacity:1;transform:translateX(0)}
.step-badge{display:inline-flex;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.07);align-items:center;justify-content:center;font-size:10px;color:#94a3b8;flex-shrink:0;margin-top:2px}
.answer-box{margin-top:12px;padding:10px 14px;border:1px solid rgba(34,197,94,.25);border-radius:8px;opacity:0;transition:opacity .5s ease,transform .5s cubic-bezier(.34,1.56,.64,1);transform:scale(.9);text-align:center}
.answer-box.visible{opacity:1;transform:scale(1);background:rgba(34,197,94,.08)}.answer-text{color:#22c55e;font-size:15px;font-weight:700}
.color-result{color:#22c55e}
.scene-overlay{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:3;text-align:center;pointer-events:none}
.scene-title{color:#e2e8f0;font-size:15px;font-weight:700;background:rgba(0,0,0,.5);padding:5px 18px;border-radius:20px;backdrop-filter:blur(4px);opacity:0;transition:opacity .5s ease;white-space:nowrap}
.scene-title.visible{opacity:1}
.known-panel{position:absolute;top:60px;left:20px;z-index:2;pointer-events:none;background:rgba(10,15,25,.75);border-radius:10px;padding:14px 16px;opacity:0;transition:opacity .6s ease}
.known-panel.visible{opacity:1}.known-title{color:#94a3b8;font-size:11px;font-weight:700;margin-bottom:6px}
.known-row{color:#cbd5e1;font-size:12px;line-height:1.8}
.ending-bg{position:absolute;inset:0;z-index:5;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);opacity:0;transition:opacity .8s ease;pointer-events:none}
.ending-bg.visible{opacity:1;pointer-events:auto}
.ending-card{background:rgba(10,15,25,.94);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:30px 40px;width:460px;text-align:center;transform:scale(.92);transition:transform .6s cubic-bezier(.34,1.56,.64,1)}
.ending-bg.visible .ending-card{transform:scale(1)}
.ending-card h2{color:#22c55e;font-size:22px;margin-bottom:22px}
.ending-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ending-item:last-child{border-bottom:none}.ending-item .l{color:#94a3b8;font-size:15px}.ending-item .r{color:#22c55e;font-size:16px;font-weight:700}
.controls{position:absolute;bottom:16px;left:16px;right:16px;z-index:10;display:flex;align-items:center;gap:12px;padding:7px 16px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.04);border-radius:28px;opacity:0;transition:opacity .3s}
.app:hover .controls{opacity:1}
.controls button{background:none;border:none;color:#d0dfff;font-size:20px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.controls button:hover{background:rgba(255,255,255,.07)}
.controls .spd{font-size:13px;font-weight:700;width:44px;color:#9aa9c9}
.progress-bar{flex:1;height:4px;background:#2a3a5a;border-radius:4px;cursor:pointer;position:relative;min-width:60px}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#f6d365,#fda085);border-radius:4px;transition:width .05s linear}
.time-label{color:#9aa9c9;font-size:12px;min-width:80px;text-align:center;font-variant-numeric:tabular-nums;flex-shrink:0}
@media(max-width:600px){body{padding:4px}.app{border-radius:8px;max-height:95vh}}
</style>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body><div class="app" id="app">
<div class="stars" id="stars"></div><canvas id="mainCanvas" width="960" height="640"></canvas>
<div id="emptyHint" style="display:none;position:absolute;inset:0;z-index:20;align-items:center;justify-content:center;color:#ef4444;font-size:18px;background:rgba(8,12,24,.9);display:none">Failed: No scenes</div>
<div class="known-panel" id="knownPanel"><div class="known-title">■ 已知量</div></div>
<div class="solution-panel" id="panel"></div>
<div class="scene-overlay"><div class="scene-title" id="sceneTitle"></div></div>
<div class="ending-bg" id="endingBg"><div class="ending-card"><h2>✅ 答案汇总</h2><div id="endingAnswers"></div></div></div>
<div class="controls" id="controls">
<button id="playBtn">▶</button><button id="rewindBtn">⏮</button>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<span class="time-label" id="timeLabel">0:00 / 0:00</span><button class="spd" id="speedBtn">1×</button>
</div></div>
<script>
(function(){
'use strict';
const _DEFAULTS={theta1:45,theta2:30};
const _IN=(typeof __INJECTED_PARAMS__!=='undefined')?__INJECTED_PARAMS__:{};
const P={theta1:_IN.theta1??_DEFAULTS.theta1,theta2:_IN.theta2??_DEFAULTS.theta2};
const t1r=P.theta1*Math.PI/180,t2r=P.theta2*Math.PI/180;
P.n=Math.sin(t1r)/Math.sin(t2r);
P.c=3e8;P.v=P.c/P.n;
P.sinC=1/P.n;P.C=Math.asin(P.sinC)*180/Math.PI;
const TOTAL=9000,FPS=60;
const _goals=_IN._goals||[];const _has=(g)=>_goals.includes(g);
const _BRICKS={
  intro:{title:'光的折射',dur:.08,goals:[],layers:['bg','env','rays','angles','labels','title','known'],
    physics:()=>({p:0,n:P.n,v:P.v,C:P.C})},
  sol_n:{title:'求折射率',dur:.08,goals:['refractive_index'],layers:['bg','env','rays','angles','labels','title','panel'],
    physics:()=>({p:1,n:P.n,v:P.v,C:P.C}),transIn:'由折射定律求折射率',
    steps:{title:'求折射率',items:['n = sinθ₁/sinθ₂','n = sin${P.theta1}°/sin${P.theta2}°','n = ${P.n.toFixed(3)}'],answer:'n = ${P.n.toFixed(3)}'},
    answerItems:['n = ${P.n.toFixed(3)}']},
  sol_v:{title:'求介质光速',dur:.07,goals:['light_speed'],layers:['bg','env','rays','labels','title','panel'],
    physics:()=>({p:1,n:P.n,v:P.v,C:P.C}),transIn:'光速与折射率关系',
    steps:{title:'求介质中光速',items:['v = c/n','v = 3.0×10⁸/${P.n.toFixed(3)}','v = ${P.v.toExponential(3)} m/s'],answer:'v = ${P.v.toExponential(3)} m/s'},
    answerItems:['v = ${P.v.toExponential(3)} m/s']},
  sol_critical:{title:'求全反射临界角',dur:.08,goals:['critical_angle'],layers:['bg','env','rays','critical','labels','title','panel'],
    physics:()=>({p:1,n:P.n,v:P.v,C:P.C}),transIn:'全反射条件',
    steps:{title:'求临界角',items:['sinC = 1/n','sinC = 1/${P.n.toFixed(3)}','C = arcsin(${P.sinC.toFixed(3)})','C = ${P.C.toFixed(1)}°'],answer:'C = ${P.C.toFixed(1)}°'},
    answerItems:['C = ${P.C.toFixed(1)}°']},
  sol_reflection:{title:'求反射角',dur:.06,goals:['reflection_angle'],layers:['bg','env','rays','angles','labels','title','panel'],
    physics:()=>({p:1,n:P.n,v:P.v,C:P.C}),transIn:'反射定律',
    steps:{title:'求反射角',items:['反射角 = 入射角','θ₁\' = θ₁ = ${P.theta1}°'],answer:'反射角 = ${P.theta1}°'},
    answerItems:['反射角 = ${P.theta1}°']},
  ending:{title:'答案汇总',dur:.05,goals:[],layers:['bg','ending']}
};
function composeScenes(goals){
  var list=['intro'];
  if(_has('refractive_index'))list.push('sol_n');
  if(_has('light_speed'))list.push('sol_v');
  if(_has('critical_angle'))list.push('sol_critical');
  if(_has('reflection_angle'))list.push('sol_reflection');
  list.push('ending');return list;
}
function allocateTime(brickIds){
  var td=0,i,b;for(i=0;i<brickIds.length;i++){b=_BRICKS[brickIds[i]];if(b)td+=b.dur;}
  var c=0,ss=[];for(i=0;i<brickIds.length;i++){
    b=_BRICKS[brickIds[i]];if(!b)continue;
    var w=b.dur/td;ss.push({id:brickIds[i],title:b.title,s:c,e:c+w,layers:b.layers,physics:b.physics,steps:b.steps,transIn:b.transIn,answerItems:b.answerItems});c+=w;
  }return ss;
}
var SCENES=allocateTime(composeScenes(_goals));
SCENES.forEach(function(s){s.sf=Math.floor(s.s*TOTAL);s.ef=Math.floor(s.e*TOTAL);s.dur=s.ef-s.sf});

// 光线绘制坐标
const CX=480,CY=340,RL=200; // 光线长度
const t1r2=P.theta1*Math.PI/180,t2r2=P.theta2*Math.PI/180;

const R={ctx:null,init(c){this.ctx=c.getContext('2d');},
rc(x,y,w,h,r){var ctx=this.ctx;if(r>w/2)r=w/2;if(r>h/2)r=h/2;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();},
arrow(x1,y1,x2,y2,c,w){var ctx=this.ctx,a=Math.atan2(y2-y1,x2-x1),hl=9,ha=.5;ctx.strokeStyle=c;ctx.lineWidth=w||2.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(a-ha),y2-hl*Math.sin(a-ha));ctx.lineTo(x2-hl*Math.cos(a+ha),y2-hl*Math.sin(a+ha));ctx.closePath();ctx.fill();},
render(scene,st,frame){
  var ctx=this.ctx,layers=scene.layers||['bg'];
  ctx.clearRect(0,0,960,640);
  if(layers.includes('bg')){var g=ctx.createRadialGradient(480,320,0,480,320,500);g.addColorStop(0,'#0f172a');g.addColorStop(.6,'#0a0e17');g.addColorStop(1,'#060a0f');ctx.fillStyle=g;ctx.fillRect(0,0,960,640);}
  if(layers.includes('env')){
    // 分界面（水平）
    ctx.strokeStyle='rgba(148,163,184,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(100,CY);ctx.lineTo(860,CY);ctx.stroke();
    // 法线（虚线）
    ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(CX,CY-150);ctx.lineTo(CX,CY+150);ctx.stroke();ctx.setLineDash([]);
    // 空气/介质标注
    ctx.fillStyle='rgba(148,163,184,.5)';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';ctx.fillText('空气 n₁=1',CX+10,CY-8);
    ctx.fillStyle='rgba(148,163,184,.5)';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('介质 n₂='+P.n.toFixed(3),CX+10,CY+8);
  }
  if(layers.includes('rays')){
    // 入射光线（左上→中心）
    var ix=CX-RL*Math.sin(t1r2),iy=CY-RL*Math.cos(t1r2);
    ctx.strokeStyle='rgba(251,191,36,.8)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(ix,iy);ctx.lineTo(CX,CY);ctx.stroke();
    // 箭头
    this.arrow(CX,CY,CX-RL*0.6*Math.sin(t1r2),CY-RL*0.6*Math.cos(t1r2),'rgba(251,191,36,.8)',2.5);
    // 反射光线（中心→左上）
    var rx=CX-RL*Math.sin(t1r2),ry=CY+RL*Math.cos(t1r2);
    ctx.strokeStyle='rgba(96,165,250,.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(rx,ry);ctx.stroke();
    this.arrow(CX,CY,CX-RL*0.6*Math.sin(t1r2),CY+RL*0.6*Math.cos(t1r2),'rgba(96,165,250,.6)',2);
    // 折射光线（中心→右下）
    var tx=CX+RL*Math.sin(t2r2),ty=CY+RL*Math.cos(t2r2);
    ctx.strokeStyle='rgba(239,68,68,.8)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(tx,ty);ctx.stroke();
    this.arrow(CX,CY,CX+RL*0.6*Math.sin(t2r2),CY+RL*0.6*Math.cos(t2r2),'rgba(239,68,68,.8)',2.5);
  }
  if(layers.includes('angles')){
    // 入射角 弧（左上，法线与入射光线之间）
    ctx.strokeStyle='rgba(251,191,36,.4)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(CX,CY,45,-Math.PI/2,-Math.PI/2+t1r2,true);ctx.stroke();
    ctx.fillStyle='rgba(251,191,36,.5)';ctx.font='12px sans-serif';ctx.textAlign='center';
    var ma=-Math.PI/2+t1r2/2;ctx.fillText('θ₁='+P.theta1+'°',CX+55*Math.cos(ma),CY+55*Math.sin(ma));
    // 反射角 弧（左上，法线与反射光线之间）
    ctx.strokeStyle='rgba(96,165,250,.4)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(CX,CY,55,Math.PI/2-t1r2,Math.PI/2,true);ctx.stroke();
    ctx.fillStyle='rgba(96,165,250,.5)';ctx.font='11px sans-serif';
    var ma2=Math.PI/2-t1r2/2;ctx.fillText("θ₁'="+P.theta1+'°',CX+70*Math.cos(ma2),CY+70*Math.sin(ma2));
    // 折射角 弧（右下，法线与折射光线之间）
    ctx.strokeStyle='rgba(239,68,68,.4)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(CX,CY,50,Math.PI/2,Math.PI/2+t2r2,true);ctx.stroke();
    ctx.fillStyle='rgba(239,68,68,.5)';ctx.font='12px sans-serif';
    var ma3=Math.PI/2+t2r2/2;ctx.fillText('θ₂='+P.theta2+'°',CX+65*Math.cos(ma3),CY+65*Math.sin(ma3));
  }
  if(layers.includes('critical')){
    // 全反射临界角标注
    ctx.strokeStyle='rgba(34,197,94,.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(CX,CY,60,-Math.PI/2,-Math.PI/2+st.C*Math.PI/180,true);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(34,197,94,.7)';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('C='+st.C.toFixed(1)+'°',CX+75*Math.cos(-Math.PI/2+st.C*Math.PI/360),CY+75*Math.sin(-Math.PI/2+st.C*Math.PI/360));
  }
  if(layers.includes('labels')){
    // 光线标签
    ctx.fillStyle='rgba(251,191,36,.7)';ctx.font='12px sans-serif';ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillText('入射光',CX-RL*Math.sin(t1r2)-10,CY-RL*Math.cos(t1r2)-5);
    ctx.fillStyle='rgba(96,165,250,.6)';ctx.textAlign='right';ctx.textBaseline='top';
    ctx.fillText('反射光',CX-RL*Math.sin(t1r2)-10,CY+RL*Math.cos(t1r2)+5);
    ctx.fillStyle='rgba(239,68,68,.7)';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('折射光',CX+RL*Math.sin(t2r2)+10,CY+RL*Math.cos(t2r2)+5);
  }
  if(layers.includes('title')){var t=scene.title;if(t){ctx.save();ctx.font='bold 14px sans-serif';ctx.fillStyle='rgba(10,15,25,.5)';this.rc(30,24,ctx.measureText(t).width+40,34,8);ctx.fill();ctx.fillStyle='#e2e8f0';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t,480,41);ctx.restore();}}
  if(scene.transIn){var sp=(frame/TOTAL-scene.s)/(scene.e-scene.s);if(sp<.15){var a=sp<.075?sp*13.3:(1-(sp-.075)*13.3);ctx.save();ctx.globalAlpha=Math.min(a,1)*.4;ctx.fillStyle='#000';ctx.fillRect(0,0,960,640);ctx.globalAlpha=1;ctx.fillStyle='#e2e8f0';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(scene.transIn,480,320);ctx.restore();}}
}};

const KP={el:null,_inited:false,
  init(){if(this._inited)return;this._inited=true;this.el=document.getElementById('knownPanel');
    if(!this.el)return;
    this.el.innerHTML='<div class="known-title">■ 已知量</div>'+
      '<div class="known-row">θ₁ = '+P.theta1+'°</div>'+
      '<div class="known-row">θ₂ = '+P.theta2+'°</div>'+
      '<div class="known-row">c = 3.0×10⁸ m/s</div>';},
  update(id){this.init();if(this.el)this.el.classList.toggle('visible',id==='intro');}
};
})();
</script></body></html>
